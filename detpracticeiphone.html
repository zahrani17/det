<style>
:root {
  --bg: #FAF7F2;
  --surface: #FFFFFF;
  --surface-2: #F4EFE6;
  --primary: #1B3A4B;
  --primary-light: #2A5A6F;
  --accent: #D4A574;
  --accent-dark: #B8893F;
  --text: #1A1A1A;
  --text-muted: #6B7280;
  --text-soft: #9CA3AF;
  --border: #E8E2D5;
  --border-strong: #D4CCBA;
  --success: #2D7D4F;
  --success-bg: #E8F5EC;
  --error: #C73E3A;
  --error-bg: #FCEAE9;
  --warning: #D97706;
  --warning-bg: #FEF3C7;
  --shadow-sm: 0 1px 2px rgba(27, 58, 75, 0.06);
  --shadow: 0 4px 14px rgba(27, 58, 75, 0.08);
  --shadow-lg: 0 12px 32px rgba(27, 58, 75, 0.14);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Tajawal', system-ui, -apple-system, sans-serif;
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
  overscroll-behavior: none;
}

body {
  background-image:
    radial-gradient(circle at 20% 0%, rgba(212, 165, 116, 0.07) 0%, transparent 40%),
    radial-gradient(circle at 80% 100%, rgba(27, 58, 75, 0.04) 0%, transparent 40%);
}

.ltr { direction: ltr; text-align: left; }
.en { font-family: 'Outfit', system-ui, sans-serif; direction: ltr; }
.serif { font-family: 'Fraunces', Georgia, serif; }
.mono { font-family: 'JetBrains Mono', monospace; }

#app {
  max-width: 720px;
  margin: 0 auto;
  padding: max(16px, env(safe-area-inset-top)) 16px 16px;
  min-height: 100vh;
  position: relative;
}

button {
  font-family: inherit;
  cursor: pointer;
  border: none;
  font-size: 1rem;
}
button:focus { outline: none; }

input, textarea {
  font-family: inherit;
  font-size: inherit;
}

.btn {
  background: var(--primary);
  color: white;
  padding: 15px 24px;
  border-radius: 14px;
  font-weight: 700;
  width: 100%;
  font-size: 1.05rem;
  transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
  box-shadow: var(--shadow);
  letter-spacing: -0.01em;
}
.btn:active { transform: translateY(1px); box-shadow: var(--shadow-sm); }
.btn:disabled { background: #C5CDD3; cursor: not-allowed; box-shadow: none; }

.btn-secondary {
  background: var(--surface);
  color: var(--primary);
  border: 1.5px solid var(--border-strong);
}
.btn-secondary:active { background: var(--surface-2); }

.btn-accent { background: var(--accent); color: var(--primary); }
.btn-accent:active { background: var(--accent-dark); }

.btn-row { display: flex; gap: 10px; }
.btn-row .btn { flex: 1; }

/* ========= START SCREEN ========= */
.start { padding-top: 12px; padding-bottom: 40px; }

.brand {
  display: flex;
  align-items: center;
  gap: 14px;
  margin-bottom: 28px;
}

.brand-logo {
  width: 54px; height: 54px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-light) 100%);
  border-radius: 16px;
  display: grid;
  place-items: center;
  color: var(--accent);
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 26px;
  box-shadow: var(--shadow);
  letter-spacing: -0.04em;
}
.brand-logo::after {
  content: '';
  width: 8px; height: 8px;
  background: var(--accent);
  border-radius: 50%;
  position: absolute;
  margin: 28px 0 0 18px;
}

.brand-text h1 {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--primary);
  line-height: 1.15;
  letter-spacing: -0.02em;
}
.brand-text p {
  font-size: 13px;
  color: var(--text-muted);
  margin-top: 2px;
}

.welcome-card {
  background: linear-gradient(135deg, var(--primary) 0%, #244A60 100%);
  color: white;
  padding: 22px 22px 24px;
  border-radius: 20px;
  margin-bottom: 22px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.welcome-card::before {
  content: '';
  position: absolute;
  top: -40px; left: -40px;
  width: 140px; height: 140px;
  background: radial-gradient(circle, rgba(212, 165, 116, 0.25) 0%, transparent 70%);
  border-radius: 50%;
}

.welcome-card h2 {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 6px;
  position: relative;
}
.welcome-card .target-line {
  font-size: 13px;
  opacity: 0.85;
  position: relative;
}
.welcome-card .target-line strong {
  color: var(--accent);
  font-weight: 700;
}

.last-score {
  display: flex;
  align-items: baseline;
  gap: 10px;
  margin-top: 14px;
  padding-top: 14px;
  border-top: 1px solid rgba(255,255,255,0.15);
  position: relative;
  font-size: 13px;
  opacity: 0.9;
}
.last-score-num {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent);
}

.section-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--text-muted);
  font-weight: 700;
  margin: 22px 0 10px;
  padding: 0 4px;
}

.test-options { display: flex; flex-direction: column; gap: 10px; }

.test-option {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 14px;
  text-align: right;
  width: 100%;
  transition: all 0.2s ease;
  box-shadow: var(--shadow-sm);
}
.test-option:active { transform: scale(0.98); border-color: var(--accent); }
.test-option .info h3 {
  font-size: 16px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 2px;
}
.test-option .info p {
  font-size: 12.5px;
  color: var(--text-muted);
}
.test-option .arrow {
  width: 32px; height: 32px;
  background: var(--surface-2);
  border-radius: 10px;
  display: grid;
  place-items: center;
  color: var(--primary);
  flex-shrink: 0;
  font-size: 20px;
  transform: scaleX(-1);
}
.test-option.featured {
  background: linear-gradient(135deg, #FFFEFA 0%, #FBF6E9 100%);
  border-color: var(--accent);
}
.test-option.featured .arrow {
  background: var(--accent);
  color: white;
}

/* History bar */
.tools-row {
  display: flex;
  gap: 8px;
  margin-top: 18px;
}
.tool-btn {
  flex: 1;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 11px 10px;
  font-size: 13px;
  font-weight: 600;
  color: var(--primary);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.tool-btn:active { background: var(--surface-2); }

/* ========= TEST SCREEN ========= */
.test {
  padding-top: 8px;
  padding-bottom: 100px;
}

.test-header {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 12px 14px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
  position: sticky;
  top: 0;
  z-index: 10;
  box-shadow: var(--shadow-sm);
  -webkit-backdrop-filter: blur(8px);
  backdrop-filter: blur(8px);
  background: rgba(255, 255, 255, 0.94);
}

.timer {
  display: flex;
  align-items: center;
  gap: 8px;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 15px;
  color: var(--primary);
}
.timer-icon {
  width: 22px; height: 22px;
  border: 2px solid var(--primary);
  border-radius: 50%;
  position: relative;
}
.timer-icon::after {
  content: '';
  position: absolute;
  top: 1px; left: 50%;
  width: 2px; height: 8px;
  background: var(--primary);
  transform: translateX(-50%);
}
.timer.warning { color: var(--warning); }
.timer.warning .timer-icon { border-color: var(--warning); animation: pulse 1s ease infinite; }
.timer.warning .timer-icon::after { background: var(--warning); }
.timer.danger { color: var(--error); }
.timer.danger .timer-icon { border-color: var(--error); animation: pulse 0.5s ease infinite; }
.timer.danger .timer-icon::after { background: var(--error); }

@keyframes pulse {
  0%, 100% { opacity: 1; transform: scale(1); }
  50% { opacity: 0.6; transform: scale(0.92); }
}

.progress-pill {
  background: var(--surface-2);
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12.5px;
  font-weight: 600;
  color: var(--primary);
}
.progress-pill .num { color: var(--accent-dark); font-weight: 700; }

.q-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 18px;
  padding: 20px 18px;
  box-shadow: var(--shadow);
  margin-bottom: 20px;
}

.q-instructions {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 10px;
  letter-spacing: -0.02em;
  line-height: 1.25;
}

.q-type-tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: var(--surface-2);
  color: var(--text-muted);
  padding: 4px 10px;
  border-radius: 8px;
  font-size: 11.5px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 14px;
}
.q-type-tag .dot {
  width: 6px; height: 6px;
  background: var(--accent);
  border-radius: 50%;
}

.passage-title {
  font-family: 'Fraunces', serif;
  font-weight: 700;
  font-size: 17px;
  color: var(--primary);
  margin-bottom: 14px;
  padding-bottom: 10px;
  border-bottom: 1px dashed var(--border);
}

.q-text {
  direction: ltr;
  text-align: left;
  font-family: 'Outfit', system-ui, sans-serif;
  font-size: 17px;
  line-height: 2.4;
  color: var(--text);
  word-spacing: 0.05em;
}

/* DET-style blank: each letter in its own box */
.blank {
  display: inline-flex;
  gap: 3px;
  padding: 0 2px;
  vertical-align: -5px;
}

/* Common box styling for prefix and letter inputs */
.box {
  width: 22px;
  height: 28px;
  display: inline-grid;
  place-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  border: 1.5px solid var(--border-strong);
  border-radius: 5px;
  background: white;
  color: var(--text);
  text-align: center;
  transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease, transform 0.1s ease;
  box-sizing: border-box;
  -webkit-appearance: none;
  appearance: none;
  padding: 0;
}

/* Prefix - shown letters */
.prefix-box {
  background: var(--surface);
  color: var(--text);
  user-select: none;
}

/* Empty input boxes for missing letters */
.letter-box {
  color: var(--primary);
  outline: none;
  caret-color: var(--accent-dark);
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
}

/* Active input - highlighted */
.letter-box:focus {
  border-color: var(--accent);
  background: #FBF6E9;
  box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.30);
  transform: translateY(-1px);
}

/* When the parent blank has any focused input, slightly highlight prefix too */
.blank.focused .prefix-box {
  border-color: var(--accent);
  background: #F7EFD9;
}

/* Review states (used during review screen if applied) */
.blank.correct .box {
  border-color: var(--success);
  background: var(--success-bg);
  color: var(--success);
}
.blank.wrong .box {
  border-color: var(--error);
  background: var(--error-bg);
  color: var(--error);
}

.submit-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: rgba(250, 247, 242, 0.95);
  -webkit-backdrop-filter: blur(10px);
  backdrop-filter: blur(10px);
  padding: 12px 16px max(16px, env(safe-area-inset-bottom));
  border-top: 1px solid var(--border);
  z-index: 20;
}
.submit-bar-inner { max-width: 720px; margin: 0 auto; }

/* ========= RESULTS SCREEN ========= */
.results { padding-top: 12px; }

.score-card {
  background: linear-gradient(160deg, var(--primary) 0%, #2A5067 100%);
  color: white;
  padding: 28px 24px;
  border-radius: 24px;
  text-align: center;
  margin-bottom: 18px;
  position: relative;
  overflow: hidden;
  box-shadow: var(--shadow-lg);
}
.score-card::before {
  content: '';
  position: absolute;
  top: -60px; right: -60px;
  width: 200px; height: 200px;
  background: radial-gradient(circle, rgba(212, 165, 116, 0.3) 0%, transparent 70%);
  border-radius: 50%;
}
.score-card::after {
  content: '';
  position: absolute;
  bottom: -80px; left: -80px;
  width: 220px; height: 220px;
  background: radial-gradient(circle, rgba(255, 255, 255, 0.06) 0%, transparent 70%);
  border-radius: 50%;
}

.score-label {
  font-size: 13px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.8;
  margin-bottom: 12px;
  font-weight: 700;
  position: relative;
}

.score-circle {
  width: 140px; height: 140px;
  margin: 0 auto 12px;
  position: relative;
}
.score-svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.score-track { fill: none; stroke: rgba(255, 255, 255, 0.15); stroke-width: 10; }
.score-fill {
  fill: none;
  stroke: var(--accent);
  stroke-width: 10;
  stroke-linecap: round;
  transition: stroke-dashoffset 1.2s cubic-bezier(0.22, 1, 0.36, 1);
  filter: drop-shadow(0 0 8px rgba(212, 165, 116, 0.5));
}
.score-text {
  position: absolute;
  inset: 0;
  display: grid;
  place-items: center;
}
.score-num {
  font-family: 'Fraunces', serif;
  font-size: 42px;
  font-weight: 700;
  line-height: 1;
  color: white;
  letter-spacing: -0.03em;
}
.score-frac {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  opacity: 0.75;
  margin-top: 4px;
}

.score-level {
  position: relative;
  margin-top: 6px;
}
.level-badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  background: rgba(212, 165, 116, 0.2);
  color: var(--accent);
  padding: 6px 14px;
  border-radius: 20px;
  font-size: 13px;
  font-weight: 700;
  border: 1px solid rgba(212, 165, 116, 0.4);
}

.score-meta {
  display: flex;
  justify-content: center;
  gap: 24px;
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px solid rgba(255, 255, 255, 0.12);
  position: relative;
}
.score-meta-item { text-align: center; }
.score-meta-label { font-size: 11px; opacity: 0.7; text-transform: uppercase; letter-spacing: 0.08em; }
.score-meta-val {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--accent);
  margin-top: 2px;
}

.encourage-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 18px;
  margin-bottom: 14px;
  display: flex;
  gap: 12px;
  align-items: flex-start;
  box-shadow: var(--shadow-sm);
}
.encourage-icon {
  width: 36px; height: 36px;
  background: var(--surface-2);
  border-radius: 10px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
  font-size: 20px;
}
.encourage-text {
  font-size: 14px;
  line-height: 1.6;
  color: var(--text);
}
.encourage-text strong { color: var(--primary); }

/* ========= REVIEW SCREEN ========= */
.review { padding-top: 8px; padding-bottom: 80px; }

.review-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 18px;
}
.review-back {
  width: 38px; height: 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: grid;
  place-items: center;
  color: var(--primary);
  font-size: 18px;
  flex-shrink: 0;
}
.review-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--primary);
  letter-spacing: -0.02em;
}

.review-tabs {
  display: flex;
  gap: 6px;
  background: var(--surface-2);
  padding: 4px;
  border-radius: 12px;
  margin-bottom: 16px;
}
.review-tab {
  flex: 1;
  padding: 9px 8px;
  border-radius: 9px;
  background: transparent;
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  transition: all 0.2s ease;
}
.review-tab.active {
  background: var(--surface);
  color: var(--primary);
  box-shadow: var(--shadow-sm);
}
.review-tab .count {
  display: inline-grid;
  place-items: center;
  min-width: 18px;
  height: 18px;
  padding: 0 6px;
  background: var(--surface-2);
  border-radius: 9px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  margin-right: 4px;
}
.review-tab.active .count { background: var(--surface-2); }

.mistake-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px 16px;
  margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
}
.mistake-card.correct-card { border-right: 3px solid var(--success); }
.mistake-card.wrong-card { border-right: 3px solid var(--error); }
.mistake-card.skipped-card { border-right: 3px solid var(--warning); }

.mistake-q-num {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
  margin-bottom: 10px;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.mistake-q-num .badge {
  display: inline-grid;
  place-items: center;
  min-width: 22px;
  height: 22px;
  padding: 0 7px;
  border-radius: 6px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
}
.correct-card .badge { background: var(--success-bg); color: var(--success); }
.wrong-card .badge { background: var(--error-bg); color: var(--error); }
.skipped-card .badge { background: var(--warning-bg); color: var(--warning); }

.mistake-context {
  direction: ltr;
  text-align: left;
  font-family: 'Outfit', sans-serif;
  font-size: 14.5px;
  line-height: 1.7;
  color: var(--text);
  background: var(--surface-2);
  padding: 10px 12px;
  border-radius: 10px;
  margin-bottom: 12px;
}
.mistake-context .blank-display {
  display: inline-block;
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  padding: 1px 6px;
  border-radius: 4px;
  margin: 0 2px;
}
.mistake-context .your-blank { background: var(--error-bg); color: var(--error); text-decoration: line-through; }
.mistake-context .right-blank { background: var(--success-bg); color: var(--success); }
.mistake-context .empty-blank { background: var(--warning-bg); color: var(--warning); font-style: italic; }
.mistake-context .neutral-blank { background: var(--surface); border: 1px solid var(--border); color: var(--text); }

.answer-row {
  display: flex;
  gap: 10px;
  margin-bottom: 8px;
  align-items: center;
  font-size: 13.5px;
}
.answer-label {
  width: 64px;
  flex-shrink: 0;
  font-size: 12px;
  font-weight: 700;
  color: var(--text-muted);
}
.answer-pill {
  font-family: 'JetBrains Mono', monospace;
  font-weight: 600;
  font-size: 13px;
  padding: 4px 10px;
  border-radius: 6px;
  direction: ltr;
}
.answer-pill.correct { background: var(--success-bg); color: var(--success); }
.answer-pill.wrong { background: var(--error-bg); color: var(--error); text-decoration: line-through; text-decoration-thickness: 1.5px; }
.answer-pill.empty { background: var(--warning-bg); color: var(--warning); font-style: italic; }

.tip-box {
  background: linear-gradient(135deg, #FBF6E9 0%, #F7EFD9 100%);
  border: 1px solid var(--accent);
  border-radius: 10px;
  padding: 10px 12px;
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  margin-top: 10px;
  display: flex;
  gap: 8px;
  align-items: flex-start;
}
.tip-box .tip-icon { color: var(--accent-dark); flex-shrink: 0; font-size: 16px; }
.tip-box strong { color: var(--accent-dark); }

/* History screen */
.history-screen { padding-top: 8px; }

.history-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.history-item .date {
  font-size: 13px;
  color: var(--text-muted);
}
.history-item .type {
  font-size: 12px;
  color: var(--primary);
  font-weight: 600;
  margin-top: 2px;
}
.history-item .score {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--primary);
}
.history-item .score .pct { font-size: 12px; color: var(--text-muted); margin-right: 4px; font-family: 'JetBrains Mono', monospace; font-weight: 500; }

.empty-state {
  text-align: center;
  padding: 50px 20px;
  color: var(--text-muted);
}
.empty-state .emoji { font-size: 40px; margin-bottom: 10px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 100px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--primary);
  color: white;
  padding: 10px 18px;
  border-radius: 100px;
  font-size: 14px;
  font-weight: 600;
  box-shadow: var(--shadow-lg);
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s ease, transform 0.3s ease;
  pointer-events: none;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* Time's up overlay */
.times-up {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.4);
  display: grid;
  place-items: center;
  z-index: 200;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  animation: fadein 0.2s ease;
}
.times-up-card {
  background: var(--primary);
  color: white;
  padding: 14px 22px;
  border-radius: 100px;
  display: flex;
  gap: 10px;
  align-items: center;
  font-size: 15px;
  font-weight: 700;
  box-shadow: var(--shadow-lg);
}
.times-up-card .check {
  width: 22px; height: 22px;
  border-radius: 50%;
  border: 2px solid white;
  display: grid;
  place-items: center;
  font-size: 12px;
}
@keyframes fadein { from { opacity: 0; } to { opacity: 1; } }

/* Confirm modal */
.modal-bg {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.5);
  display: grid;
  place-items: center;
  z-index: 300;
  -webkit-backdrop-filter: blur(4px);
  backdrop-filter: blur(4px);
  animation: fadein 0.2s ease;
  padding: 20px;
}
.modal {
  background: var(--surface);
  border-radius: 20px;
  padding: 24px;
  max-width: 360px;
  width: 100%;
  box-shadow: var(--shadow-lg);
  text-align: center;
}
.modal h3 {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  color: var(--primary);
  margin-bottom: 8px;
}
.modal p {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 18px;
  line-height: 1.6;
}

/* Input animation when filled */
@keyframes fillFlash {
  0% { background-color: rgba(212, 165, 116, 0.40); }
  100% { background-color: rgba(212, 165, 116, 0.10); }
}

/* Page transition */
.fade-in { animation: fadeIn 0.35s cubic-bezier(0.22, 1, 0.36, 1); }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

/* Small screens adjustment */
@media (max-width: 380px) {
  .q-text { font-size: 15.5px; line-height: 2.4; }
  .box { width: 19px; height: 25px; font-size: 13px; }
  .q-instructions { font-size: 19px; }
}

/* ========= LEARN MODE ========= */
.learn { padding-top: 8px; padding-bottom: 100px; }

.learn-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.learn-back {
  width: 38px; height: 38px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  display: grid;
  place-items: center;
  color: var(--primary);
  font-size: 18px;
  flex-shrink: 0;
}
.learn-title {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 600;
  color: var(--primary);
}

.learn-stats {
  background: linear-gradient(135deg, var(--primary) 0%, #2A5067 100%);
  color: white;
  padding: 14px 16px;
  border-radius: 14px;
  display: flex;
  justify-content: space-around;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
}
.learn-stat-item { text-align: center; }
.learn-stat-num {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 700;
  color: var(--accent);
  line-height: 1;
}
.learn-stat-label {
  font-size: 11px;
  opacity: 0.85;
  margin-top: 4px;
  text-transform: uppercase;
  letter-spacing: 0.05em;
}

/* Category chips */
.cat-chips {
  display: flex;
  gap: 6px;
  overflow-x: auto;
  padding: 4px 0 8px;
  margin: 0 -16px 14px;
  padding-left: 16px;
  padding-right: 16px;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-chips::-webkit-scrollbar { display: none; }
.cat-chip {
  flex-shrink: 0;
  padding: 8px 14px;
  border-radius: 100px;
  background: var(--surface);
  border: 1.5px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  display: inline-flex;
  align-items: center;
  gap: 5px;
  white-space: nowrap;
}
.cat-chip.active {
  background: var(--primary);
  color: white;
  border-color: var(--primary);
}
.cat-chip .count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  opacity: 0.7;
}

/* Word card */
.word-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 10px;
  box-shadow: var(--shadow-sm);
  cursor: pointer;
  transition: transform 0.15s ease, border-color 0.15s ease;
}
.word-card:active { transform: scale(0.98); }
.word-card.expanded { border-color: var(--accent); }

.word-card-head {
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: 12px;
}
.word-en {
  font-family: 'Outfit', sans-serif;
  font-size: 19px;
  font-weight: 700;
  color: var(--primary);
  direction: ltr;
}
.word-ar {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
  text-align: left;
  flex: 1;
  margin-right: 12px;
}
.word-card-body {
  margin-top: 12px;
  padding-top: 12px;
  border-top: 1px dashed var(--border);
  display: none;
}
.word-card.expanded .word-card-body { display: block; }

.word-example {
  direction: ltr;
  text-align: left;
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  line-height: 1.65;
  color: var(--text);
  background: var(--surface-2);
  padding: 10px 12px;
  border-radius: 8px;
  margin-bottom: 10px;
}
.word-example .highlight {
  background: var(--accent);
  color: white;
  font-weight: 700;
  padding: 1px 6px;
  border-radius: 4px;
}

.word-tip {
  font-size: 13px;
  line-height: 1.65;
  color: var(--text-muted);
  display: flex;
  gap: 6px;
  align-items: flex-start;
}
.word-tip .tip-icon { color: var(--accent-dark); flex-shrink: 0; }

.word-known-toggle {
  margin-top: 10px;
  padding: 8px 14px;
  border-radius: 8px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-muted);
  width: 100%;
}
.word-card.known .word-known-toggle {
  background: var(--success-bg);
  border-color: var(--success);
  color: var(--success);
}
.word-card.known {
  background: linear-gradient(to left, var(--success-bg) 0%, var(--surface) 60%);
}

/* ========= FLASHCARD MODE ========= */
.flashcard-screen { padding-top: 8px; padding-bottom: 30px; }

.flashcard {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 22px;
  padding: 28px 22px;
  margin-bottom: 16px;
  min-height: 320px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  text-align: center;
  box-shadow: var(--shadow);
  position: relative;
}

.flashcard-mode-tag {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--surface-2);
  color: var(--text-muted);
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.flashcard-prompt {
  font-size: 14px;
  color: var(--text-muted);
  margin-bottom: 14px;
}

.flashcard-meaning {
  font-family: 'Fraunces', serif;
  font-size: 28px;
  font-weight: 600;
  color: var(--primary);
  line-height: 1.35;
  margin-bottom: 14px;
  letter-spacing: -0.01em;
}

.flashcard-example {
  direction: ltr;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  background: var(--surface-2);
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 16px;
}
.flashcard-example .blank-mask {
  display: inline-block;
  background: var(--primary);
  color: var(--primary);
  border-radius: 4px;
  padding: 0 4px;
  letter-spacing: 0.4em;
  user-select: none;
}

.flashcard-answer {
  margin-top: 14px;
  padding-top: 16px;
  border-top: 1px dashed var(--border);
  display: none;
}
.flashcard.revealed .flashcard-answer { display: block; }

.flashcard-word {
  font-family: 'Outfit', sans-serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--accent-dark);
  direction: ltr;
  margin-bottom: 8px;
  letter-spacing: -0.02em;
}

.flashcard-tip {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text-muted);
  background: #FBF6E9;
  padding: 10px 12px;
  border-radius: 8px;
  text-align: right;
}

.flashcard-actions { display: flex; gap: 8px; }
.flashcard-actions .btn { flex: 1; }

/* Hint button in test */
.hint-btn {
  background: var(--surface);
  border: 1.5px solid var(--accent);
  color: var(--accent-dark);
  padding: 11px 14px;
  border-radius: 12px;
  font-weight: 700;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 6px;
  justify-content: center;
  box-shadow: var(--shadow-sm);
  flex-shrink: 0;
  white-space: nowrap;
}
.hint-btn:active { background: #FBF6E9; }
.hint-btn .hint-count {
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  background: var(--accent);
  color: white;
  padding: 1px 6px;
  border-radius: 6px;
}

.submit-bar-row { display: flex; gap: 8px; }
.submit-bar-row .btn { flex: 1; }

/* Hint flash animation */
@keyframes hintFlash {
  0%, 100% { background: white; }
  50% { background: #FBF6E9; transform: scale(1.1); }
}
.letter-box.hinted {
  background: #FBF6E9;
  border-color: var(--accent);
  color: var(--accent-dark);
  animation: hintFlash 0.6s ease;
}

/* Mode select cards on home (added) */
.mode-section { margin-top: 22px; }
.mode-section .section-title {
  font-family: 'Fraunces', serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--primary);
  margin-bottom: 10px;
}

.learn-options { display: flex; gap: 10px; }
.learn-option {
  flex: 1;
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 14px;
  padding: 14px 12px;
  text-align: center;
  box-shadow: var(--shadow-sm);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
}
.learn-option:active { transform: scale(0.97); border-color: var(--accent); }
.learn-option .emoji { font-size: 26px; }
.learn-option .lbl {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1.2;
}
.learn-option .sub {
  font-size: 11px;
  color: var(--text-muted);
  font-weight: 500;
}

/* Empty state in flashcards */
.flashcard-empty {
  text-align: center;
  padding: 60px 20px;
  color: var(--text-muted);
}
.flashcard-empty .emoji { font-size: 50px; margin-bottom: 14px; }


/* ========= SPEECH BUTTON ========= */
.speak-btn {
  display: inline-grid;
  place-items: center;
  width: 36px; height: 36px;
  border-radius: 10px;
  background: var(--surface-2);
  border: 1px solid var(--border);
  color: var(--primary);
  font-size: 16px;
  flex-shrink: 0;
  transition: all 0.15s ease;
}
.speak-btn:active {
  background: var(--accent);
  color: white;
  transform: scale(0.92);
}
.speak-btn.speaking {
  background: var(--accent);
  color: white;
  animation: speakPulse 0.8s ease infinite;
}
@keyframes speakPulse {
  0%, 100% { box-shadow: 0 0 0 0 rgba(212, 165, 116, 0.5); }
  50% { box-shadow: 0 0 0 8px rgba(212, 165, 116, 0); }
}

.word-en-row { display: flex; align-items: center; gap: 10px; }

/* ========= WRITE MODE (Active Recall) ========= */
.write-screen { padding-top: 8px; padding-bottom: 30px; }

.write-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 22px;
  padding: 24px 20px;
  margin-bottom: 16px;
  text-align: center;
  box-shadow: var(--shadow);
  position: relative;
}

.write-card-mode-tag {
  position: absolute;
  top: 14px; right: 14px;
  background: var(--accent);
  color: white;
  padding: 4px 10px;
  border-radius: 6px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}

.write-prompt-label {
  font-size: 13px;
  color: var(--text-muted);
  margin-bottom: 14px;
  margin-top: 8px;
}

.write-meaning {
  font-family: 'Fraunces', serif;
  font-size: 26px;
  font-weight: 600;
  color: var(--primary);
  line-height: 1.3;
  margin-bottom: 14px;
}

.write-context {
  direction: ltr;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  background: var(--surface-2);
  padding: 12px 14px;
  border-radius: 10px;
  margin-bottom: 16px;
}
.write-context .target-mask {
  display: inline-block;
  background: var(--primary);
  color: var(--primary);
  border-radius: 4px;
  padding: 0 8px;
  letter-spacing: 0.5em;
  user-select: none;
  min-width: 60px;
}

.write-input-wrap {
  display: flex;
  gap: 8px;
  margin-bottom: 14px;
  align-items: stretch;
}
.write-input {
  flex: 1;
  font-family: 'JetBrains Mono', monospace;
  font-size: 18px;
  font-weight: 600;
  padding: 14px 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 12px;
  outline: none;
  background: white;
  color: var(--primary);
  text-align: center;
  letter-spacing: 0.06em;
  -webkit-appearance: none;
  appearance: none;
  caret-color: var(--accent-dark);
}
.write-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.25);
}
.write-input.correct {
  border-color: var(--success);
  background: var(--success-bg);
  color: var(--success);
}
.write-input.wrong {
  border-color: var(--error);
  background: var(--error-bg);
  color: var(--error);
  animation: shake 0.4s ease;
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

.write-feedback {
  margin-top: 16px;
  padding-top: 16px;
  border-top: 1px dashed var(--border);
  display: none;
}
.write-card.feedback-shown .write-feedback { display: block; }

.write-result-label {
  font-size: 13px;
  font-weight: 700;
  margin-bottom: 8px;
}
.write-card.is-correct .write-result-label { color: var(--success); }
.write-card.is-wrong .write-result-label { color: var(--error); }

.write-correct-answer {
  font-family: 'Outfit', sans-serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--accent-dark);
  direction: ltr;
  margin-bottom: 8px;
  letter-spacing: -0.01em;
}

.write-tip-box {
  font-size: 13px;
  line-height: 1.6;
  color: var(--text);
  background: #FBF6E9;
  padding: 10px 12px;
  border-radius: 8px;
  text-align: right;
  margin-top: 8px;
}

.write-stats-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-around;
  align-items: center;
  margin-bottom: 14px;
  font-size: 12px;
}
.write-stat-mini { text-align: center; }
.write-stat-mini-num {
  font-family: 'Fraunces', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1;
}
.write-stat-mini-num.success { color: var(--success); }
.write-stat-mini-num.error { color: var(--error); }
.write-stat-mini-label {
  color: var(--text-muted);
  margin-top: 3px;
}

/* ========= DICTATION MODE ========= */
.dictation-card {
  background: linear-gradient(160deg, var(--primary) 0%, #2A5067 100%);
  color: white;
  padding: 32px 22px;
  border-radius: 22px;
  text-align: center;
  margin-bottom: 16px;
  box-shadow: var(--shadow-lg);
  position: relative;
}

.dictation-icon-big {
  width: 80px;
  height: 80px;
  margin: 0 auto 16px;
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(212, 165, 116, 0.5);
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 36px;
  cursor: pointer;
  transition: all 0.2s ease;
}
.dictation-icon-big:active { transform: scale(0.95); }
.dictation-icon-big.speaking {
  background: var(--accent);
  border-color: var(--accent);
  animation: speakPulse 1s ease infinite;
}

.dictation-prompt {
  font-size: 14px;
  opacity: 0.85;
  margin-bottom: 6px;
}
.dictation-instruction {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 500;
  margin-bottom: 16px;
  color: var(--accent);
}

/* ========= DIFFICULT WORDS LIST ========= */
.difficult-words-screen { padding-top: 8px; padding-bottom: 30px; }

.diff-word-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-right: 3px solid var(--error);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.diff-word-info { flex: 1; }
.diff-word-en {
  font-family: 'Outfit', sans-serif;
  font-weight: 700;
  color: var(--primary);
  font-size: 16px;
  direction: ltr;

  async get(key) {
    try {
      const v = localStorage.getItem('det_' + key);
      return v ? { value: v } : null;
    } catch { return null; }
  },
  async set(key, value) {
    try {
      localStorage.setItem('det_' + key, value);
      return { value };
    } catch { return null; }
  }
};

/* ============================================================
   SPEECH SYNTHESIS
   ============================================================ */
let speechVoices = [];
let preferredVoice = null;
let preferredArabicVoice = null;

// Voice quality scoring - higher = more natural
function scoreVoice(v, langPrefix) {
  if (!v.lang.startsWith(langPrefix)) return -1;
  const name = (v.name || '').toLowerCase();
  let score = 0;
  // Premium / Enhanced markers (these are usually neural/high-quality)
  if (/premium/i.test(v.name)) score += 100;
  if (/enhanced/i.test(v.name)) score += 60;
  if (/neural/i.test(v.name)) score += 80;
  if (/siri/i.test(v.name)) score += 90; // Siri voices are very natural
  // Specific high-quality voice names known to be good on iOS
  if (langPrefix === 'en') {
    if (/ava|evan|zoe|aaron|nicky/i.test(v.name)) score += 50;
    if (/samantha|alex|karen|daniel|moira|tessa/i.test(v.name)) score += 30;
    // Prefer en-US over en-GB for DET
    if (v.lang === 'en-US') score += 10;
  } else if (langPrefix === 'ar') {
    if (/maged/i.test(v.name)) score += 60;
    if (/reed/i.test(v.name)) score += 80; // Premium Arabic on newer iOS
    // Saudi dialect preferred
    if (v.lang === 'ar-SA') score += 20;
    else if (v.lang === 'ar-AE') score += 10;
  }
  // Penalize obviously low-quality voices
  if (/compact|eloquence|fred/i.test(name)) score -= 20;
  // Local (offline) voices preferred for reliability
  if (v.localService) score += 5;
  return score;
}

function pickBestVoice(langPrefix) {
  const candidates = speechVoices
    .map(v => ({ v, score: scoreVoice(v, langPrefix) }))
    .filter(x => x.score >= 0)
    .sort((a, b) => b.score - a.score);
  return candidates.length > 0 ? candidates[0].v : null;
}

function loadVoices() {
  speechVoices = window.speechSynthesis.getVoices();
  preferredVoice = pickBestVoice('en');
  preferredArabicVoice = pickBestVoice('ar');
  // Debug log (remove in production if noisy)
  if (preferredVoice) console.log('EN voice:', preferredVoice.name, '|', preferredVoice.lang);
  if (preferredArabicVoice) console.log('AR voice:', preferredArabicVoice.name, '|', preferredArabicVoice.lang);
}
if (typeof window !== 'undefined' && window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

function speak(text, opts = {}) {
  if (!('speechSynthesis' in window)) return false;
  // Cancel any ongoing
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = opts.rate || 0.9;  // Slightly slower for learning
  u.pitch = opts.pitch || 1;
  u.volume = 1;
  if (preferredVoice) u.voice = preferredVoice;
  if (opts.onstart) u.onstart = opts.onstart;
  if (opts.onend) u.onend = opts.onend;
  if (opts.onerror) u.onerror = opts.onerror;
  window.speechSynthesis.speak(u);
  return true;
}

async function speakWord(word, btnEl) {
  if (btnEl) btnEl.classList.add('speaking');
  
  // CRITICAL: Unlock Web Audio synchronously from user gesture
  // This must happen BEFORE any await to maintain gesture context
  unlockWebAudio();
  
  // Try ElevenLabs first (human voice via Web Audio API - works in iOS)
  if (state.el && state.el.enabled && state.el.apiKey) {
    try {
      const success = await playElevenLabsAudio(word, false);
      if (success) {
        if (btnEl) btnEl.classList.remove('speaking');
        return;
      }
    } catch (e) {
      console.warn('ElevenLabs failed for speakWord, falling back:', e);
    }
  }
  
  // Fallback to native TTS
  speak(word, {
    rate: 0.88,
    pitch: 1.05,
    onend: () => { if (btnEl) btnEl.classList.remove('speaking'); },
    onerror: () => { if (btnEl) btnEl.classList.remove('speaking'); }
  });
}

// Spell word letter by letter
let spellByLetterCancelled = false;
function speakWordSpelled(word, btnEl) {
  if (btnEl) btnEl.classList.add('speaking');
  spellByLetterCancelled = false;
  const letters = word.toLowerCase().split('');
  let idx = 0;
  
  function speakNextLetter() {
    if (spellByLetterCancelled || idx >= letters.length) {
      if (btnEl) btnEl.classList.remove('speaking');
      return;
    }
    if (window.speechSynthesis) window.speechSynthesis.cancel();
    // Pronounce letter clearly - using phonetic-friendly approach
    const letter = letters[idx];
    const u = new SpeechSynthesisUtterance(letter);
    u.lang = 'en-US';
    u.rate = 0.7;
    u.pitch = 1.05;
    if (preferredVoice) u.voice = preferredVoice;
    u.onend = () => {
      setTimeout(() => {
        idx++;
        speakNextLetter();
      }, 350);
    };
    u.onerror = () => {
      setTimeout(() => {
        idx++;
        speakNextLetter();
      }, 350);
    };
    window.speechSynthesis.speak(u);
  }
  speakNextLetter();
}

function stopAllSpeech() {
  spellByLetterCancelled = true;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// Reveal one more letter as hint
function dictRevealHint() {
  const w = state.writeOrder[state.writeIdx];
  if (!w) return;
  const word = w.blanks[0].answer;
  if (state.dictHintLevel >= word.length - 1) {
    showToast('لا مزيد من التلميحات');
    return;
  }
  state.dictHintLevel++;
  // Pre-fill input with revealed letters
  const inp = document.getElementById('write-input');
  if (inp && !state.writeChecked) {
    const revealed = word.substring(0, state.dictHintLevel);
    inp.value = revealed;
    // Move cursor to end
    inp.focus();
    setTimeout(() => inp.setSelectionRange(revealed.length, revealed.length), 0);
  }
  render();
}

// Replay with counter
function dictReplay(speed) {
  const w = state.writeOrder[state.writeIdx];
  if (!w) return;
  state.dictReplayCount++;
  const word = w.blanks[0].answer;
  stopAllSpeech();
  if (speed === 'slow') {
    speakWordSlow(word);
  } else if (speed === 'spell') {
    speakWordSpelled(word);
  } else {
    speakWord(word);
  }
  // Don't re-render here - speaker is in DOM
}

// Generate character-level comparison HTML
function renderCharComparison(userAnswer, correctAnswer) {
  const ua = userAnswer.toLowerCase();
  const ca = correctAnswer.toLowerCase();
  const result = [];
  
  // Simple character-by-character with shifting alignment
  // Use longest common subsequence-ish approach but keep it simple
  const maxLen = Math.max(ua.length, ca.length);
  for (let i = 0; i < maxLen; i++) {
    const uc = ua[i];
    const cc = ca[i];
    if (i >= ua.length) {
      // Missing characters
      result.push({ ch: cc, status: 'missing' });
    } else if (i >= ca.length) {
      // Extra characters
      result.push({ ch: uc, status: 'extra' });
    } else if (uc === cc) {
      result.push({ ch: cc, status: 'correct' });
    } else {
      result.push({ ch: uc, status: 'wrong', expected: cc });
    }
  }
  return result;
}

   Most iOS devices have "Maged" (Saudi Arabic) built-in
   ============================================================ */
function getArabicVoice() {
  // Use the cached best voice (refreshed by loadVoices)
  return preferredArabicVoice || null;
}

// Humanize Arabic text for more natural speech:
// - Replace "/" between alternatives with " أو " (or)
// - Add commas where parentheses indicate alternatives
function humanizeArabic(text) {
  if (!text) return text;
  // Replace " / " or "/" between words with " أو "
  let t = text.replace(/\s*\/\s*/g, ' ، أو ');
  // Replace parentheses content - "كلمة (بديل)" -> "كلمة، أو بديل"
  t = t.replace(/\s*\(([^)]+)\)/g, '، $1');
  // Replace English dashes used as separators with comma (better pause)
  t = t.replace(/\s+-\s+/g, '، ');
  return t;
}

async function speakArabic(text, opts = {}) {
  const humanText = humanizeArabic(text);
  // Try ElevenLabs first if enabled
  if (state.el.enabled && state.el.apiKey) {
    const success = await playElevenLabsAudio(humanText, true);
    if (success) {
      if (opts.onend) opts.onend();
      return;
    }
  }
  // Fallback: native
  return new Promise((resolve) => {
    if (!('speechSynthesis' in window)) { resolve(); return; }
    window.speechSynthesis.cancel();
    const u = new SpeechSynthesisUtterance(humanText);
    u.lang = 'ar-SA';
    u.rate = opts.rate || 0.95;
    u.pitch = opts.pitch || 1;
    u.volume = 1;
    const arVoice = getArabicVoice();
    if (arVoice) u.voice = arVoice;
    u.onend = () => { if (opts.onend) opts.onend(); resolve(); };
    u.onerror = () => { if (opts.onend) opts.onend(); resolve(); };
    window.speechSynthesis.speak(u);
  });
}

/* ============================================================
   INDEXEDDB AUDIO CACHE — stores generated audio for unlimited replays
   ============================================================ */
const AUDIO_DB_NAME = 'det_audio_cache_v1';
const AUDIO_STORE = 'audio';
let audioDB = null;

function openAudioDB() {
  return new Promise((resolve, reject) => {
    if (audioDB) { resolve(audioDB); return; }
    const req = indexedDB.open(AUDIO_DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(AUDIO_STORE)) {
        db.createObjectStore(AUDIO_STORE);
      }
    };
    req.onsuccess = () => { audioDB = req.result; resolve(audioDB); };
    req.onerror = () => reject(req.error);
  });
}

async function audioCacheGet(key) {
  try {
    const db = await openAudioDB();
    return new Promise((resolve) => {
      const tx = db.transaction(AUDIO_STORE, 'readonly');
      const req = tx.objectStore(AUDIO_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}

async function audioCacheSet(key, blob) {
  try {
    const db = await openAudioDB();
    return new Promise((resolve) => {
      const tx = db.transaction(AUDIO_STORE, 'readwrite');
      tx.objectStore(AUDIO_STORE).put(blob, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    });
  } catch { return false; }
}

async function audioCacheCount() {
  try {
    const db = await openAudioDB();
    return new Promise((resolve) => {
      const tx = db.transaction(AUDIO_STORE, 'readonly');
      const req = tx.objectStore(AUDIO_STORE).count();
      req.onsuccess = () => resolve(req.result || 0);
      req.onerror = () => resolve(0);
    });
  } catch { return 0; }
}

async function audioCacheClear() {
  try {
    const db = await openAudioDB();
    return new Promise((resolve) => {
      const tx = db.transaction(AUDIO_STORE, 'readwrite');
      tx.objectStore(AUDIO_STORE).clear();
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    });
  } catch { return false; }
}

function makeAudioKey(text, voiceId) {
  // Build a stable cache key (speed-independent - playback rate applied during playback)
  return voiceId + '::' + text.trim().toLowerCase();
}

async function fetchElevenLabsAudio(text, voiceId, isArabic) {
  if (!state.el.apiKey) return null;
  if (!text || !text.trim()) return null;
  
  try {
    // Choose model based on save mode and text length
    // - Save mode: always flash (0.5 credit/char)
    // - Normal mode: multilingual for short words (1 credit/char, better pronunciation), flash for sentences
    const isShortText = text.trim().length < 40;
    const useMultilingual = !state.el.saveMode && isShortText;
    const model = useMultilingual ? 'eleven_multilingual_v2' : 'eleven_flash_v2_5';
    const url = 'https://api.elevenlabs.io/v1/text-to-speech/' + voiceId;
    // Always generate at normal speed (1.0) - user speed applied during playback
    // This way one cached audio works for all speeds (huge credit savings!)
    const body = {
      text: text,
      model_id: model,
      voice_settings: {
        stability: 0.75,       // Higher = slower, more controlled pronunciation
        similarity_boost: 0.85, // Higher = closer to original voice
        style: 0.0,            // Lower = less expressive, more neutral/clear
        use_speaker_boost: true
        // Note: speed removed here - applied at playback via Web Audio API
      }
    };
    
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'xi-api-key': state.el.apiKey,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify(body)
    });
    
    if (!response.ok) {
      const errorText = await response.text();
      console.error('ElevenLabs API error:', response.status, errorText);
      
      // Check if quota/credits exhausted (multiple possible error indicators)
      const isQuotaError = response.status === 429 || 
                          response.status === 402 || 
                          errorText.toLowerCase().includes('quota') ||
                          errorText.toLowerCase().includes('credit') ||
                          errorText.toLowerCase().includes('limit') ||
                          errorText.toLowerCase().includes('exceeded');
      
      if (response.status === 401) {
        showToast('⚠️ مفتاح API غير صحيح');
        state.el.enabled = false;
      } else if (isQuotaError) {
        showToast('⚠️ نفدت credits — ارجع للصوت العادي. تجدد شهرياً.', 5000);
        state.el.quotaWarning = true;
        // Auto-disable to prevent repeated failed calls
        state.el.enabled = false;
        await saveElevenLabsSettings();
      } else if (response.status === 422) {
        showToast('⚠️ معرّف الصوت خطأ');
      } else {
        showToast('⚠️ خطأ في الاتصال: ' + response.status);
      }
      return null;
    }
    
    const blob = await response.blob();
    state.el.apiCalls++;
    return blob;
  } catch (e) {
    console.error('ElevenLabs fetch failed:', e);
    return null;
  }
}

// Get audio (from cache or API) and play it
// ============================================================
// WEB AUDIO API SYSTEM - iOS-compatible audio playback
// Uses AudioContext which only needs one user gesture to unlock,
// then can play any audio at any time (including in async loops/autoplay)
// ============================================================
let webAudioContext = null;
let webAudioUnlocked = false;
let currentAudioSource = null;

// Initialize/unlock AudioContext - MUST be called from user gesture (click/tap)
// Returns true if unlocked successfully
async function unlockWebAudio() {
  try {
    if (!webAudioContext) {
      const AudioCtx = window.AudioContext || window.webkitAudioContext;
      if (!AudioCtx) return false;
      webAudioContext = new AudioCtx();
    }
    // iOS keeps context "suspended" until user gesture
    if (webAudioContext.state === 'suspended') {
      await webAudioContext.resume();
    }
    // Play a tiny silent buffer to fully unlock iOS audio
    if (!webAudioUnlocked && webAudioContext.state === 'running') {
      const buffer = webAudioContext.createBuffer(1, 1, 22050);
      const source = webAudioContext.createBufferSource();
      source.buffer = buffer;
      source.connect(webAudioContext.destination);
      source.start(0);
      webAudioUnlocked = true;
    }
    return webAudioUnlocked;
  } catch (e) {
    console.warn('Web Audio unlock failed:', e);
    return false;
  }
}

// Decode an audio blob into an AudioBuffer
async function decodeAudioBlob(blob) {
  if (!webAudioContext) return null;
  try {
    const arrayBuffer = await blob.arrayBuffer();
    // decodeAudioData with promise-based API (modern) or callback (older Safari)
    return await new Promise((resolve, reject) => {
      const decoded = webAudioContext.decodeAudioData(
        arrayBuffer,
        (buffer) => resolve(buffer),
        (err) => reject(err)
      );
      // Modern API returns a Promise
      if (decoded && typeof decoded.then === 'function') {
        decoded.then(resolve).catch(reject);
      }
    });
  } catch (e) {
    console.error('Audio decode failed:', e);
    return null;
  }
}

// Play an audio blob using Web Audio API - works in iOS async contexts
async function playAudioBlob(blob) {
  if (!blob) return false;
  
  // Ensure AudioContext is ready
  if (!webAudioContext || webAudioContext.state !== 'running') {
    // Try to resume (may fail if not from gesture)
    if (webAudioContext) {
      try { await webAudioContext.resume(); } catch {}
    }
    if (!webAudioContext || webAudioContext.state !== 'running') {
      // Fallback to HTML Audio if Web Audio not available
      return playAudioBlobFallback(blob);
    }
  }
  
  const audioBuffer = await decodeAudioBlob(blob);
  if (!audioBuffer) return playAudioBlobFallback(blob);
  
  // Stop any currently playing audio
  if (currentAudioSource) {
    try { currentAudioSource.stop(); } catch {}
    currentAudioSource = null;
  }
  
  return new Promise((resolve) => {
    try {
      const source = webAudioContext.createBufferSource();
      source.buffer = audioBuffer;
      
      // Apply user-selected playback speed (independent of cached audio speed)
      // playbackRate: 0.5 = half speed, 1.0 = normal, 2.0 = double speed
      const userSpeed = (typeof state.el.speed === 'number') ? state.el.speed : 0.9;
      source.playbackRate.value = userSpeed;
      
      source.connect(webAudioContext.destination);
      currentAudioSource = source;
      
      source.onended = () => {
        if (currentAudioSource === source) {
          currentAudioSource = null;
        }
        resolve(true);
      };
      
      source.start(0);
    } catch (e) {
      console.error('Audio playback failed:', e);
      resolve(false);
    }
  });
}

// Fallback to HTML Audio (for browsers without Web Audio API)
async function playAudioBlobFallback(blob) {
  return new Promise((resolve) => {
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    // Apply user speed via playbackRate
    const userSpeed = (typeof state.el.speed === 'number') ? state.el.speed : 0.9;
    audio.playbackRate = userSpeed;
    audio.onended = () => {
      URL.revokeObjectURL(url);
      resolve(true);
    };
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      resolve(false);
    };
    audio.play().catch(() => {
      URL.revokeObjectURL(url);
      resolve(false);
    });
  });
}

// Stop any currently playing Web Audio
function stopWebAudio() {
  if (currentAudioSource) {
    try { currentAudioSource.stop(); } catch {}
    currentAudioSource = null;
  }
}

async function playElevenLabsAudio(text, isArabic) {
  if (!state.el.enabled || !state.el.apiKey) return null;
  
  const voiceId = isArabic ? state.el.voiceAr : state.el.voiceEn;
  const key = makeAudioKey(text, voiceId);
  
  // Try cache first
  let blob = await audioCacheGet(key);
  if (blob) {
    state.el.cacheHits++;
  } else {
    // Fetch from API
    blob = await fetchElevenLabsAudio(text, voiceId, isArabic);
    if (blob) {
      await audioCacheSet(key, blob);
    }
  }
  
  if (!blob) return null;
  
  // Use Web Audio API (works in iOS even from async contexts)
  return await playAudioBlob(blob);
}

// Pre-cache all 400 words and their data
async function preCacheAllWords(onProgress) {
  if (!state.el.apiKey) {
    showToast('أضف API key أولاً');
    return;
  }
  
  state.el.isPreCaching = true;
  state.el.preCacheProgress = 0;
  
  // Build list of all texts to cache
  const texts = [];
  for (const w of QUESTIONS.sentences) {
    const word = w.blanks[0].answer;
    const meaning = MEANINGS[word.toLowerCase()] || '';
    const exObj = EXAMPLES[word.toLowerCase()];
    
    if (word) texts.push({ text: word, isArabic: false });
    if (meaning) texts.push({ text: humanizeArabic(meaning), isArabic: true });
    if (exObj && exObj.en) texts.push({ text: exObj.en, isArabic: false });
    if (exObj && exObj.ar) texts.push({ text: humanizeArabic(exObj.ar), isArabic: true });
  }
  
  state.el.preCacheTotal = texts.length;
  
  // Process in batches to avoid overwhelming API
  let done = 0;
  let cached = 0;
  let fetched = 0;
  
  for (const item of texts) {
    if (!state.el.isPreCaching) break; // user cancelled
    
    const voiceId = item.isArabic ? state.el.voiceAr : state.el.voiceEn;
    const key = makeAudioKey(item.text, voiceId);
    
    // Skip if already cached
    const existing = await audioCacheGet(key);
    if (existing) {
      cached++;
    } else {
      const blob = await fetchElevenLabsAudio(item.text, voiceId, item.isArabic);
      if (blob) {
        await audioCacheSet(key, blob);
        fetched++;
      }
      // Small delay to be nice to API
      await new Promise(r => setTimeout(r, 80));
    }
    done++;
    state.el.preCacheProgress = done;
    if (onProgress) onProgress(done, texts.length, cached, fetched);
  }
  
  state.el.isPreCaching = false;
  showToast(`✓ اكتمل! ${fetched} جديد، ${cached} موجود مسبقاً`);
}

  state.el.isPreCaching = false;

}

/* ============================================================
   QUESTION SELECTION
   ============================================================ */
async function pickQuestions(type) {
  const recent = await loadRecentQuestions();
  
  let pool;
  if (type === 'quick') pool = QUESTIONS.sentences;
  else if (type === 'passage') pool = QUESTIONS.passages;
  else pool = [...QUESTIONS.sentences, ...QUESTIONS.passages];

  // sort: not recent first, then random
  const fresh = pool.filter(q => !recent.includes(q.id));
  const seen = pool.filter(q => recent.includes(q.id));
  
  const targets = {
    quick: 8,         // 8 sentences
    passage: 3,       // 3 passages
    full: 8           // 5 sentences + 3 passages
  };
  
  let count = targets[type];
  let selected;
  
  if (type === 'full') {
    const sentencesPool = QUESTIONS.sentences.slice();
    const passagesPool = QUESTIONS.passages.slice();
    shuffle(sentencesPool);
    shuffle(passagesPool);
    // Filter recent
    const sFresh = sentencesPool.filter(q => !recent.includes(q.id));
    const pFresh = passagesPool.filter(q => !recent.includes(q.id));
    const sentences = (sFresh.length >= 5 ? sFresh : sentencesPool).slice(0, 5);
    const passages = (pFresh.length >= 3 ? pFresh : passagesPool).slice(0, 3);
    // Interleave: sentence, sentence, passage, sentence, passage, sentence, sentence, passage
    selected = [sentences[0], sentences[1], passages[0], sentences[2], passages[1], sentences[3], sentences[4], passages[2]].filter(Boolean);
  } else {
    const ordered = shuffle([...fresh]).concat(shuffle([...seen]));
    selected = ordered.slice(0, count);
  }
  
  // update recent
  const newRecent = recent.concat(selected.map(q => q.id));
  await saveRecentQuestions(newRecent);
  
  return selected;
}

function shuffle(arr) {
  for (let i = arr.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [arr[i], arr[j]] = [arr[j], arr[i]];
  }
  return arr;
}

/* ============================================================
   TEST SCREEN
   ============================================================ */
async function startTest(type) {
  state.testType = type;
  state.questions = await pickQuestions(type);
  state.currentIndex = 0;
  state.answers = state.questions.map(q => q.blanks.map(() => ''));
  state.totalStart = Date.now();
  state.hintsUsed = 0;
  state.screen = 'test';
  startQuestionTimer();
  render();
}

function startQuestionTimer() {
  const q = state.questions[state.currentIndex];
  state.timeRemaining = q.time;
  state.questionStart = Date.now();
  if (state.timer) clearInterval(state.timer);
  state.timer = setInterval(tickTimer, 1000);
}

function tickTimer() {
  if (state.paused) return;
  state.timeRemaining--;
  updateTimerDisplay();
  if (state.timeRemaining <= 0) {
    clearInterval(state.timer);
    showTimesUp();
  }
}

function updateTimerDisplay() {
  const el = document.getElementById('timer');
  if (!el) return;
  const m = Math.floor(state.timeRemaining / 60);
  const s = state.timeRemaining % 60;
  el.querySelector('.time-text').textContent = `${m}:${String(s).padStart(2, '0')}`;
  el.classList.remove('warning', 'danger');
  if (state.timeRemaining <= 10) el.classList.add('danger');
  else if (state.timeRemaining <= 30) el.classList.add('warning');
}

function showTimesUp() {
  document.body.insertAdjacentHTML('beforeend', `
    <div class="times-up" id="times-up">
      <div class="times-up-card">
        <div class="check">✓</div>
        <span>Time's up. Saved!</span>
      </div>
    </div>
  `);
  // Capture current answers
  captureAnswers();
  setTimeout(() => {
    document.getElementById('times-up')?.remove();
    nextQuestion();
  }, 1400);
}

function captureAnswers() {
  const blanks = document.querySelectorAll('.blank[data-idx]');
  blanks.forEach(blank => {
    const idx = parseInt(blank.dataset.idx);
    const letters = Array.from(blank.querySelectorAll('.letter-box'))
      .map(i => i.value).join('');
    state.answers[state.currentIndex][idx] = letters;
  });
}

function nextQuestion() {
  if (state.currentIndex < state.questions.length - 1) {
    state.currentIndex++;
    startQuestionTimer();
    render();
  } else {
    if (state.timer) clearInterval(state.timer);
    finishTest();
  }
}

function submitQuestion() {
  captureAnswers();
  // Check if any blanks empty
  const empty = state.answers[state.currentIndex].some(a => !a);
  if (empty) {
    showConfirmModal({
      title: 'هل أنت متأكد؟',
      msg: 'بعض الفراغات لم تُملأ. هل تريد المتابعة؟',
      onConfirm: () => {
        document.querySelector('.modal-bg')?.remove();
        nextQuestion();
      },
      onCancel: () => document.querySelector('.modal-bg')?.remove()
    });
  } else {
    nextQuestion();
  }
}

function showConfirmModal({ title, msg, onConfirm, onCancel }) {
  const html = `
    <div class="modal-bg" onclick="if(event.target===this)this.remove()">
      <div class="modal">

        <p>${msg}</p>
        <div class="btn-row">
          <button class="btn btn-secondary" id="m-cancel">إلغاء</button>
          <button class="btn" id="m-ok">متابعة</button>
        </div>
      </div>
    </div>
  `;
  document.body.insertAdjacentHTML('beforeend', html);
  document.getElementById('m-ok').onclick = onConfirm;
  document.getElementById('m-cancel').onclick = onCancel;
}

function renderTest() {
  const q = state.questions[state.currentIndex];
  const isPassage = !!q.title;
  const m = Math.floor(q.time / 60);
  const s = q.time % 60;
  const initialTime = `${m}:${String(s).padStart(2, '0')}`;
  
  // Build text with blanks
  const blanksHTML = (parts) => {
    return parts.map(part => {
      if (typeof part === 'string') return escapeHtml(part);
      const b = q.blanks[part.index];
      const remaining = b.answer.length - b.prefix.length;
      const prevAns = state.answers[state.currentIndex][part.index] || '';
      // Pre-fill if user already typed
      let suffix = '';
      if (prevAns.toLowerCase().startsWith(b.prefix.toLowerCase())) {
        suffix = prevAns.slice(b.prefix.length);
      } else {
        suffix = prevAns;
      }
      const prefixBoxes = b.prefix.split('').map(ch =>
        `<span class="box prefix-box">${escapeHtml(ch)}</span>`
      ).join('');
      const letterBoxes = Array.from({length: remaining}).map((_, i) =>
        `<input class="box letter-box"
                data-blank="${part.index}"
                data-pos="${i}"
                value="${escapeHtml(suffix[i] || '')}"
                maxlength="1"
                autocomplete="off"
                autocapitalize="off"
                autocorrect="off"
                spellcheck="false"
                inputmode="text" />`
      ).join('');
      return `<span class="blank" data-idx="${part.index}">${prefixBoxes}${letterBoxes}</span>`;
    }).join('');
  };
  
  const parts = parseTextWithBlanks(q.text);
  const passageHTML = isPassage 
    ? `<div class="passage-title">${escapeHtml(q.title)}</div>` 
    : '';
  
  const instructionText = isPassage 
    ? 'Complete the text with the correct words'
    : 'Complete the sentence with the correct word';
  
  const tagText = isPassage ? 'فقرة' : 'جملة';
  
  return `
    <div class="test fade-in">
      <div class="test-header">
        <div class="timer" id="timer">
          <div class="timer-icon"></div>
          <span class="time-text">${initialTime}</span>
          <span style="font-weight:400; font-size:13px; color:var(--text-muted);">للسؤال</span>
        </div>
        <div class="progress-pill">
          <span class="num">${state.currentIndex + 1}</span> / ${state.questions.length}
        </div>
      </div>
      
      <div class="q-card">
        <div class="q-type-tag">
          <span class="dot"></span>
          ${tagText} · ${state.questions[state.currentIndex].blanks.length} فراغ${state.questions[state.currentIndex].blanks.length > 2 ? 'ات' : ''}
        </div>
        <div class="q-instructions en">${instructionText}</div>
        ${passageHTML}
        <div class="q-text">${blanksHTML(parts)}</div>
      </div>
      
      <div class="submit-bar">
        <div class="submit-bar-inner">
          <div class="submit-bar-row">
            <button class="hint-btn" onclick="useHint()">
              💡 تلميح <span class="hint-count" id="hint-count">${state.hintsUsed}</span>
            </button>
            <button class="btn" id="submit-btn" onclick="submitQuestion()">
              ${state.currentIndex === state.questions.length - 1 ? 'إنهاء الاختبار' : 'التالي ←'}
            </button>
          </div>
        </div>
      </div>
    </div>
  `;
}

function parseTextWithBlanks(text) {
  const parts = [];
  const re = /\{(\d+)\}/g;
  let last = 0, m;
  while ((m = re.exec(text)) !== null) {
    if (m.index > last) parts.push(text.slice(last, m.index));
    parts.push({ index: parseInt(m[1]) });
    last = m.index + m[0].length;
  }
  if (last < text.length) parts.push(text.slice(last));
  return parts;
}

function escapeHtml(s) {
  return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function setupTestInputs() {
  const allInputs = Array.from(document.querySelectorAll('.letter-box'));

  allInputs.forEach((inp, idx) => {
    inp.addEventListener('focus', () => {
      const blank = inp.closest('.blank');
      blank.classList.add('focused');
      setTimeout(() => {
        inp.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }, 250);
    });

    inp.addEventListener('blur', () => {
      const blank = inp.closest('.blank');
      // Remove focus class only if no sibling input is now focused
      setTimeout(() => {
        if (!blank.querySelector('.letter-box:focus')) {
          blank.classList.remove('focused');
        }
      }, 50);
    });

    inp.addEventListener('input', (e) => {
      const val = e.target.value;
      // Cap at 1 character (in case of paste/composition)
      if (val.length > 1) {
        e.target.value = val.charAt(val.length - 1);
      }
      if (e.target.value.length === 1) {
        // Auto-advance to next box
        const next = allInputs[idx + 1];
        if (next) next.focus();
      }
    });

    inp.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value) {
        const prev = allInputs[idx - 1];
        if (prev) {
          e.preventDefault();
          prev.focus();
          // Position cursor at end
          setTimeout(() => {
            const len = prev.value.length;
            try { prev.setSelectionRange(len, len); } catch(_) {}
          }, 0);
        }
      } else if (e.key === 'ArrowLeft') {
        e.preventDefault();
        const prev = allInputs[idx - 1];
        if (prev) prev.focus();
      } else if (e.key === 'ArrowRight') {
        e.preventDefault();
        const next = allInputs[idx + 1];
        if (next) next.focus();
      } else if (e.key === 'Enter') {
        e.preventDefault();
        const next = allInputs[idx + 1];
        if (next) next.focus();
        else inp.blur();
      }
    });

    // Handle paste — distribute characters across boxes
    inp.addEventListener('paste', (e) => {
      e.preventDefault();
      const pasted = ((e.clipboardData || window.clipboardData).getData('text') || '').trim();
      const chars = pasted.split('');
      let curIdx = idx;
      for (const ch of chars) {
        if (curIdx >= allInputs.length) break;
        allInputs[curIdx].value = ch;
        curIdx++;
      }
      const focusIdx = Math.min(curIdx, allInputs.length - 1);
      if (allInputs[focusIdx]) allInputs[focusIdx].focus();
    });
  });

  // Focus first empty input
  for (const inp of allInputs) {
    if (!inp.value) {
      setTimeout(() => inp.focus(), 120);
      break;
    }
  }
}

/* ============================================================
   FINISH & SCORE
   ============================================================ */
function finishTest() {
  let correct = 0, total = 0;
  const breakdown = [];
  
  state.questions.forEach((q, qi) => {
    const qResult = { question: q, blanks: [] };
    q.blanks.forEach((b, bi) => {
      const userAns = (state.answers[qi][bi] || '').trim().toLowerCase();
      const correctAns = b.answer.toLowerCase();
      const fullUser = userAns.startsWith(b.prefix.toLowerCase()) 
        ? userAns 
        : (b.prefix + userAns).toLowerCase();
      const isCorrect = fullUser === correctAns;
      const isEmpty = !userAns;
      qResult.blanks.push({
        prefix: b.prefix,
        answer: b.answer,
        userInput: state.answers[qi][bi] || '',
        userFull: fullUser,
        correct: isCorrect,
        empty: isEmpty
      });
      if (isCorrect) correct++;
      total++;
      // Track sentence-level results for difficult words
      if (q.id && q.id.startsWith('s') && !isEmpty) {
        recordWordResult(q.id, isCorrect);
      }
    });
    breakdown.push(qResult);
  });
  
  const percent = (correct / total) * 100;
  const elapsed = Math.round((Date.now() - state.totalStart) / 1000);
  
  // Estimate DET score
  let detEstimate, detLevel;
  if (percent >= 90) { detEstimate = '110-130'; detLevel = 'متقدم'; }
  else if (percent >= 80) { detEstimate = '95-115'; detLevel = 'متقدم مبكر'; }
  else if (percent >= 70) { detEstimate = '85-105'; detLevel = 'متوسط أعلى'; }
  else if (percent >= 60) { detEstimate = '70-90'; detLevel = 'متوسط'; }
  else if (percent >= 45) { detEstimate = '55-75'; detLevel = 'متوسط مبتدئ'; }
  else { detEstimate = '40-60'; detLevel = 'مبتدئ'; }
  
  const record = {
    date: new Date().toISOString(),
    type: state.testType,
    correct, total, percent,
    elapsed,
    breakdown: breakdown.map(qr => ({
      qId: qr.question.id,
      qTitle: qr.question.title || qr.question.text.replace(/\{\d+\}/g, '___').slice(0, 40),
      blanks: qr.blanks
    })),
    detEstimate, detLevel
  };
  
  state.lastResult = { ...record, breakdown };
  saveHistory({ ...record });
  
  state.screen = 'results';
  render();
}

function renderReview() {
  const r = state.lastResult;
  const allBlanks = [];
  r.breakdown.forEach((qr, qi) => {
    qr.blanks.forEach((b, bi) => {
      allBlanks.push({ ...b, qIndex: qi, bIndex: bi, qData: qr });
    });
  });
  
  const wrong = allBlanks.filter(b => !b.correct && !b.empty);
  const empty = allBlanks.filter(b => b.empty);
  const right = allBlanks.filter(b => b.correct);
  
  let displayed;
  if (state.reviewTab === 'wrong') displayed = wrong;
  else if (state.reviewTab === 'empty') displayed = empty;
  else displayed = right;
  
  // Group by question
  const byQ = {};
  displayed.forEach(b => {
    if (!byQ[b.qIndex]) byQ[b.qIndex] = [];
    byQ[b.qIndex].push(b);
  });
  
  let cardsHTML = '';
  if (displayed.length === 0) {
    if (state.reviewTab === 'wrong') {
      cardsHTML = `<div class="empty-state"><div class="emoji">🎉</div><div>ممتاز! ما عندك أخطاء في هذا الاختبار.</div></div>`;
    } else if (state.reviewTab === 'empty') {
      cardsHTML = `<div class="empty-state"><div class="emoji">✅</div><div>عبّأت كل الفراغات. أحسنت!</div></div>`;
    } else {
      cardsHTML = `<div class="empty-state"><div class="emoji">📚</div><div>راجع الأخطاء لتتحسن.</div></div>`;
    }
  } else {
    Object.keys(byQ).forEach(qi => {
      const q = state.questions[qi];
      const qr = r.breakdown[qi];
      const isPassage = !!q.title;
      const cardClass = state.reviewTab === 'wrong' ? 'wrong-card' : (state.reviewTab === 'empty' ? 'skipped-card' : 'correct-card');
      
      // Build the text with all blanks shown (your answer + correct)
      const parts = parseTextWithBlanks(q.text);
      let textHTML = parts.map(part => {
        if (typeof part === 'string') return escapeHtml(part);
        const ans = qr.blanks[part.index];
        if (ans.empty) {
          return `<span class="blank-display empty-blank">${escapeHtml(ans.prefix)}___</span>`;
        }
        if (ans.correct) {
          return `<span class="blank-display right-blank">${escapeHtml(ans.answer)}</span>`;
        }
        return `<span class="blank-display your-blank">${escapeHtml(ans.userFull)}</span><span class="blank-display right-blank" style="margin-left:2px;">${escapeHtml(ans.answer)}</span>`;
      }).join('');
      
      const titleLine = isPassage 
        ? `<div style="font-family: 'Fraunces', serif; font-weight:600; color:var(--primary); font-size:15px; margin-bottom:8px;">${escapeHtml(q.title)}</div>`
        : '';
      
      const wrongBlanksList = byQ[qi].map(b => {
        if (b.empty) {
          return `<div class="answer-row">
            <div class="answer-label">لم تُجب</div>
            <span class="answer-pill empty">${escapeHtml(b.prefix)}___</span>
            <span style="color:var(--text-muted); font-size:13px;">←</span>
            <span class="answer-pill correct">${escapeHtml(b.answer)}</span>
          </div>`;
        }
        if (!b.correct) {
          return `<div class="answer-row">
            <div class="answer-label">إجابتك</div>
            <span class="answer-pill wrong">${escapeHtml(b.userFull)}</span>
            <span style="color:var(--text-muted); font-size:13px;">←</span>
            <span class="answer-pill correct">${escapeHtml(b.answer)}</span>
          </div>`;
        }
        return `<div class="answer-row">
          <div class="answer-label">صحيح</div>
          <span class="answer-pill correct">${escapeHtml(b.answer)}</span>
        </div>`;
      }).join('');
      
      const tipHTML = q.tip ? `
        <div class="tip-box">
          <span class="tip-icon">💡</span>
          <div><strong>نصيحة:</strong> ${escapeHtml(q.tip)}</div>
        </div>
      ` : '';
      
      cardsHTML += `
        <div class="mistake-card ${cardClass}">
          <div class="mistake-q-num">
            <span class="badge">س ${parseInt(qi) + 1}</span>
            <span>${isPassage ? 'فقرة قراءة' : 'جملة قصيرة'}</span>
          </div>
          ${titleLine}
          <div class="mistake-context">${textHTML}</div>
          ${wrongBlanksList}
          ${state.reviewTab !== 'right' ? tipHTML : ''}
        </div>
      `;
    });
  }
  
  return `
    <div class="review fade-in">
      <div class="review-header">
        <button class="review-back" onclick="state.screen='results'; render();">→</button>
        <div class="review-title">مراجعة الأخطاء</div>
      </div>
      
      <div class="review-tabs">
        <button class="review-tab ${state.reviewTab === 'wrong' ? 'active' : ''}" onclick="setReviewTab('wrong')">
          <span class="count">${wrong.length}</span> أخطاء
        </button>
        <button class="review-tab ${state.reviewTab === 'empty' ? 'active' : ''}" onclick="setReviewTab('empty')">
          <span class="count">${empty.length}</span> فارغة
        </button>
        <button class="review-tab ${state.reviewTab === 'right' ? 'active' : ''}" onclick="setReviewTab('right')">
          <span class="count">${right.length}</span> صحيحة
        </button>
      </div>
      
      ${cardsHTML}
      
      <div style="margin-top: 20px;">
        <button class="btn" onclick="goHome()">🏠 للرئيسية</button>
      </div>
    </div>
  `;
}

        <div style="font-family:'Fraunces',serif; font-size:24px; font-weight:700; color:var(--accent-dark); margin-top:4px;">${bestPercent}%</div>
