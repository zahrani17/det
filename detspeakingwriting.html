<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1B3A4B">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DET Speaking">
<title>DET Speaking & Writing</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' fill='%231B3A4B'/%3E%3Ctext x='50' y='65' text-anchor='middle' font-size='50' fill='%23D4A574' font-family='serif' font-weight='bold'%3E🎤%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@400;500;600;700&family=Outfit:wght@400;500;600;700&family=Tajawal:wght@400;500;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FAF7F2;
  --surface: #FFFFFF;
  --surface-2: #F4EFE6;
  --primary: #1B3A4B;
  --primary-light: #2A5067;
  --accent: #D4A574;
  --accent-dark: #B8893F;
  --text: #2C2C2C;
  --text-muted: #6B7280;
  --border: #E8DFCF;
  --border-strong: #D4C8B0;
  --success: #2D7A4F;
  --success-bg: #E8F4ED;
  --error: #B83C3C;
  --error-bg: #FBEBEB;
  --warning: #D89B2A;
  --warning-bg: #FDF5E0;
  --shadow-sm: 0 1px 2px rgba(27, 58, 75, 0.06);
  --shadow: 0 4px 12px rgba(27, 58, 75, 0.08);
  --shadow-lg: 0 8px 24px rgba(27, 58, 75, 0.12);
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  height: 100%;
  overflow-x: hidden;
}

body {
  font-family: 'Tajawal', 'Outfit', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.55;
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  padding-top: env(safe-area-inset-top, 0);
  padding-bottom: env(safe-area-inset-bottom, 0);
  min-height: 100vh;
}

button {
  font-family: inherit;
  border: none;
  background: none;
  cursor: pointer;
  color: inherit;
  font-size: inherit;
}

input, textarea {
  font-family: inherit;
  color: inherit;
}

#app {
  max-width: 480px;
  margin: 0 auto;
  padding: 16px 14px 40px;
  min-height: 100vh;
}

.fade-in { animation: fadeIn 0.35s ease; }
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(6px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ============= TYPOGRAPHY ============= */
h1, h2, h3 { font-family: 'Fraunces', serif; color: var(--primary); }

.section-label {
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin: 18px 4px 10px;
  letter-spacing: 0.02em;
}

/* ============= BUTTONS ============= */
.btn {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  width: 100%;
  padding: 14px 18px;
  background: var(--primary);
  color: white;
  border-radius: 14px;
  font-weight: 700;
  font-size: 15px;
  transition: all 0.15s ease;
  box-shadow: var(--shadow);
}
.btn:active {
  transform: scale(0.97);
  background: var(--primary-light);
}
.btn.btn-secondary {
  background: var(--surface);
  color: var(--primary);
  border: 1.5px solid var(--border-strong);
  box-shadow: var(--shadow-sm);
}
.btn.btn-secondary:active { background: var(--surface-2); }
.btn.btn-accent { background: var(--accent); }
.btn.btn-accent:active { background: var(--accent-dark); }
.btn.btn-danger { background: var(--error); }
.btn.btn-success { background: var(--success); }

/* ============= HOME ============= */
.hero-card {
  background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white;
  padding: 22px 20px;
  border-radius: 22px;
  margin-bottom: 18px;
  box-shadow: var(--shadow-lg);
  position: relative;
  overflow: hidden;
}
.hero-card::after {
  content: '🎤✍️';
  position: absolute;
  top: -10px; left: -10px;
  font-size: 70px;
  opacity: 0.08;
  transform: rotate(-15deg);
}
.hero-title {
  font-family: 'Fraunces', serif;
  font-size: 22px;
  font-weight: 600;
  margin-bottom: 4px;
}
.hero-sub {
  font-size: 13px;
  opacity: 0.85;
  font-weight: 400;
}

.mode-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}

.mode-btn {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 20px 14px 18px;
  text-align: center;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 6px;
  transition: all 0.15s ease;
  box-shadow: var(--shadow-sm);
}
.mode-btn:active { transform: scale(0.97); background: var(--surface-2); }
.mode-btn .emoji { font-size: 30px; line-height: 1; margin-bottom: 4px; }
.mode-btn .lbl {
  font-weight: 700;
  font-size: 14px;
  color: var(--primary);
  font-family: 'Tajawal', sans-serif;
}
.mode-btn .sub {
  font-size: 11px;
  color: var(--text-muted);
}

.time-chips {
  display: flex;
  gap: 8px;
  margin-bottom: 18px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.time-chips::-webkit-scrollbar { display: none; }
.time-chip {
  flex-shrink: 0;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  padding: 8px 14px;
  font-size: 12.5px;
  color: var(--text);
  display: inline-flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
}
.time-chip b {
  font-family: 'Fraunces', serif;
  font-size: 14px;
  color: var(--primary);
  font-weight: 700;
}
.time-chip.streak {
  background: linear-gradient(135deg, #FFF4E1 0%, #FDE5C8 100%);
  border-color: var(--accent);
}
.time-chip.streak b { color: var(--accent-dark); }

/* ============= HEADER ============= */
.screen-header {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 14px;
}
.header-back {
  width: 38px; height: 38px;
  border-radius: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--primary);
  font-size: 18px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.header-back:active { background: var(--surface-2); }
.header-title {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 600;
  color: var(--primary);
}

/* ============= PROMPT CARD ============= */
.prompt-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 18px;
  padding: 18px;
  box-shadow: var(--shadow-sm);
  margin-bottom: 14px;
}
.prompt-cat-tag {
  display: inline-block;
  background: var(--surface-2);
  color: var(--accent-dark);
  padding: 3px 10px;
  border-radius: 100px;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.04em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.prompt-en {
  direction: ltr;
  text-align: left;
  font-family: 'Outfit', sans-serif;
  font-size: 17px;
  font-weight: 600;
  color: var(--primary);
  line-height: 1.5;
  margin-bottom: 10px;
}
.prompt-ar {
  font-size: 14px;
  color: var(--text-muted);
  line-height: 1.6;
  border-top: 1px dashed var(--border);
  padding-top: 10px;
}

/* ============= KEY POINTS HINT ============= */
.hints-box {
  background: linear-gradient(135deg, #FBF6E9 0%, #FDF5E0 100%);
  border: 1px solid var(--accent);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 14px;
}
.hints-box h4 {
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent-dark);
  margin-bottom: 8px;
}
.hints-box ul {
  list-style: none;
  padding: 0;
  margin: 0;
}
.hints-box li {
  font-size: 13px;
  color: var(--text);
  padding: 4px 0;
  padding-right: 16px;
  position: relative;
  line-height: 1.6;
}
.hints-box li::before {
  content: '◆';
  position: absolute;
  right: 0;
  top: 4px;
  color: var(--accent);
  font-size: 10px;
}

.vocab-pills {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-top: 10px;
}
.vocab-pill {
  background: var(--surface);
  border: 1px solid var(--accent);
  color: var(--accent-dark);
  padding: 4px 10px;
  border-radius: 100px;
  font-family: 'Outfit', sans-serif;
  font-size: 12px;
  font-weight: 600;
  direction: ltr;
}

/* ============= TIMER ============= */
.timer-card {
  background: var(--primary);
  color: white;
  padding: 20px;
  border-radius: 18px;
  text-align: center;
  margin-bottom: 14px;
  box-shadow: var(--shadow);
  position: relative;
}
.timer-card.prep { background: linear-gradient(135deg, #D89B2A 0%, #B8893F 100%); }
.timer-card.active { background: linear-gradient(135deg, var(--success) 0%, #1F5A3A 100%); }
.timer-card.over { background: linear-gradient(135deg, var(--error) 0%, #8A2C2C 100%); animation: pulseError 1s ease infinite; }

@keyframes pulseError {
  0%, 100% { box-shadow: 0 0 0 0 rgba(184, 60, 60, 0.5); }
  50% { box-shadow: 0 0 0 12px rgba(184, 60, 60, 0); }
}

.timer-label {
  font-size: 12px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.85;
  margin-bottom: 6px;
}
.timer-display {
  font-family: 'JetBrains Mono', monospace;
  font-size: 48px;
  font-weight: 700;
  line-height: 1;
  letter-spacing: -0.02em;
}
.timer-progress {
  height: 6px;
  background: rgba(255, 255, 255, 0.2);
  border-radius: 100px;
  overflow: hidden;
  margin-top: 12px;
}
.timer-bar {
  height: 100%;
  background: white;
  border-radius: 100px;
  transition: width 0.3s linear;
}

/* ============= RECORDING ============= */
.record-section {
  background: var(--surface);
  border: 2px solid var(--border-strong);
  border-radius: 18px;
  padding: 24px 16px;
  text-align: center;
  margin-bottom: 14px;
}
.record-section.recording {
  border-color: var(--error);
  background: var(--error-bg);
}

.record-btn-big {
  width: 88px;
  height: 88px;
  border-radius: 50%;
  background: var(--error);
  color: white;
  font-size: 36px;
  display: grid;
  place-items: center;
  margin: 0 auto 14px;
  box-shadow: 0 4px 16px rgba(184, 60, 60, 0.3);
  transition: all 0.2s ease;
}
.record-btn-big:active { transform: scale(0.94); }
.record-btn-big.recording {
  animation: recordPulse 1.2s ease infinite;
  background: linear-gradient(135deg, var(--error) 0%, #DC2626 100%);
}
@keyframes recordPulse {
  0%, 100% { box-shadow: 0 4px 16px rgba(184, 60, 60, 0.3); transform: scale(1); }
  50% { box-shadow: 0 4px 24px rgba(184, 60, 60, 0.6); transform: scale(1.05); }
}

.record-status {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  font-weight: 600;
  color: var(--primary);
}
.record-hint {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}

.waveform {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 3px;
  height: 30px;
  margin: 10px 0;
}
.waveform .bar {
  width: 3px;
  background: var(--error);
  border-radius: 2px;
  animation: waveBar 1s ease infinite;
}
.waveform .bar:nth-child(1) { animation-delay: 0s; }
.waveform .bar:nth-child(2) { animation-delay: 0.1s; }
.waveform .bar:nth-child(3) { animation-delay: 0.2s; }
.waveform .bar:nth-child(4) { animation-delay: 0.3s; }
.waveform .bar:nth-child(5) { animation-delay: 0.4s; }
.waveform .bar:nth-child(6) { animation-delay: 0.5s; }
.waveform .bar:nth-child(7) { animation-delay: 0.6s; }
@keyframes waveBar {
  0%, 100% { height: 6px; }
  50% { height: 28px; }
}

.playback-card {
  background: var(--surface);
  border: 1.5px solid var(--success);
  border-radius: 14px;
  padding: 14px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 12px;
}
.playback-btn {
  width: 48px; height: 48px;
  border-radius: 50%;
  background: var(--success);
  color: white;
  font-size: 20px;
  display: grid;
  place-items: center;
  flex-shrink: 0;
}
.playback-btn:active { transform: scale(0.95); }
.playback-info {
  flex: 1;
}
.playback-title {
  font-weight: 700;
  color: var(--primary);
  font-size: 14px;
}
.playback-duration {
  font-family: 'JetBrains Mono', monospace;
  font-size: 12px;
  color: var(--text-muted);
}

/* ============= WRITING AREA ============= */
.writing-stats-bar {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 10px 14px;
  display: flex;
  justify-content: space-around;
  margin-bottom: 10px;
  font-size: 12px;
}
.writing-stat {
  text-align: center;
}
.writing-stat-num {
  font-family: 'Fraunces', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1;
}
.writing-stat-num.low { color: var(--warning); }
.writing-stat-num.good { color: var(--success); }
.writing-stat-num.over { color: var(--error); }
.writing-stat-label {
  font-size: 10px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-top: 3px;
}

.write-area {
  width: 100%;
  min-height: 240px;
  padding: 14px 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 14px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  line-height: 1.7;
  background: var(--surface);
  color: var(--text);
  direction: ltr;
  text-align: left;
  resize: vertical;
  outline: none;
  transition: border-color 0.15s ease;
  -webkit-appearance: none;
}
.write-area:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.2);
}

/* ============= EVALUATION RESULT ============= */
.score-card {
  background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white;
  padding: 22px 18px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 14px;
  box-shadow: var(--shadow-lg);
}
.score-display {
  font-family: 'Fraunces', serif;
  font-size: 56px;
  font-weight: 700;
  line-height: 1;
  margin: 10px 0;
}
.score-display.good { color: var(--accent); }
.score-display.average { color: #FFC857; }
.score-display.needs-work { color: #FF9B7B; }
.score-label {
  font-size: 13px;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  opacity: 0.85;
}
.score-equivalent {
  display: inline-block;
  background: rgba(255, 255, 255, 0.15);
  border-radius: 100px;
  padding: 6px 14px;
  font-size: 13px;
  margin-top: 10px;
  font-weight: 600;
}

.metrics-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 14px;
}
.metric-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px;
  position: relative;
}
.metric-label {
  font-size: 11px;
  color: var(--text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  margin-bottom: 4px;
}
.metric-value {
  font-family: 'Fraunces', serif;
  font-size: 24px;
  font-weight: 700;
  color: var(--primary);
  line-height: 1;
}
.metric-rating {
  font-size: 11px;
  font-weight: 700;
  margin-top: 4px;
  padding: 2px 8px;
  border-radius: 100px;
  display: inline-block;
}
.metric-rating.excellent { background: var(--success-bg); color: var(--success); }
.metric-rating.good { background: #E3EEF6; color: var(--primary); }
.metric-rating.fair { background: var(--warning-bg); color: var(--warning); }
.metric-rating.weak { background: var(--error-bg); color: var(--error); }

.feedback-card {
  background: var(--surface-2);
  border-right: 3px solid var(--accent);
  border-radius: 12px;
  padding: 12px 14px;
  margin-bottom: 14px;
}
.feedback-card h4 {
  font-family: 'Tajawal', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--primary);
  margin-bottom: 6px;
}
.feedback-card ul { padding-right: 16px; margin: 0; }
.feedback-card li { font-size: 13px; line-height: 1.7; color: var(--text); margin-bottom: 4px; }

/* ============= MODEL ANSWER ============= */
.model-card {
  background: var(--surface);
  border: 1.5px solid var(--accent);
  border-radius: 16px;
  padding: 16px;
  margin-bottom: 14px;
}
.model-card h4 {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  color: var(--accent-dark);
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 8px;
}
.model-text {
  direction: ltr;
  text-align: left;
  font-family: 'Outfit', sans-serif;
  font-size: 14.5px;
  line-height: 1.75;
  color: var(--text);
  background: #FBF8F2;
  padding: 12px 14px;
  border-radius: 10px;
}
.model-listen {
  margin-top: 10px;
  display: flex;
  gap: 8px;
}
.model-listen button {
  flex: 1;
  padding: 10px;
  background: var(--accent);
  color: white;
  border-radius: 10px;
  font-weight: 700;
  font-size: 13px;
}

/* ============= SELF RATING ============= */
.rating-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 16px;
  padding: 18px 16px;
  text-align: center;
  margin-bottom: 14px;
}
.rating-card h4 {
  font-family: 'Tajawal', sans-serif;
  font-size: 14px;
  color: var(--primary);
  margin-bottom: 12px;
}
.stars {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-bottom: 6px;
}
.star {
  font-size: 36px;
  color: var(--border-strong);
  transition: all 0.15s ease;
  background: none;
  border: none;
  padding: 4px;
}
.star.active { color: var(--accent); }
.star:active { transform: scale(0.85); }
.rating-text {
  font-size: 12px;
  color: var(--text-muted);
  min-height: 16px;
}

/* ============= LISTEN & TYPE ============= */
.listen-card {
  background: linear-gradient(160deg, var(--primary) 0%, var(--primary-light) 100%);
  color: white;
  padding: 28px 20px;
  border-radius: 20px;
  text-align: center;
  margin-bottom: 14px;
  box-shadow: var(--shadow-lg);
}
.listen-icon-big {
  width: 80px;
  height: 80px;
  margin: 0 auto 14px;
  background: rgba(255, 255, 255, 0.1);
  border: 2px solid rgba(212, 165, 116, 0.5);
  border-radius: 50%;
  display: grid;
  place-items: center;
  font-size: 32px;
  cursor: pointer;
}
.listen-icon-big.speaking {
  background: var(--accent);
  border-color: var(--accent);
  animation: recordPulse 1.2s ease infinite;
}
.listen-instr {
  font-family: 'Fraunces', serif;
  font-size: 16px;
  color: var(--accent);
}

.listen-input {
  width: 100%;
  padding: 14px 16px;
  border: 1.5px solid var(--border-strong);
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  font-size: 15px;
  background: var(--surface);
  color: var(--text);
  direction: ltr;
  text-align: left;
  outline: none;
  -webkit-appearance: none;
}
.listen-input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(212, 165, 116, 0.2);
}

.listen-result {
  margin-top: 12px;
  padding: 14px;
  border-radius: 12px;
  font-family: 'Outfit', sans-serif;
  direction: ltr;
  text-align: left;
  line-height: 1.7;
}
.listen-result .word-correct { color: var(--success); font-weight: 600; }
.listen-result .word-wrong { color: var(--error); text-decoration: line-through; font-weight: 600; }
.listen-result .word-missing { color: var(--warning); font-weight: 600; }

/* ============= TOAST ============= */
.toast {
  position: fixed;
  bottom: 80px;

    "model": "If I won a substantial amount of money, my approach would balance responsibility, growth, and generosity. First, I would handle the practical foundations. I'd ensure my family's financial security by paying off any debts and setting aside enough for my parents' comfortable retirement. Second, I would invest the majority — perhaps sixty percent — in diversified assets like real estate and index funds. This isn't just about wealth preservation; it's about creating long-term financial freedom that allows me to make better choices throughout life. Third, I would dedicate a significant portion to causes I care about. Quality education in underserved areas has always been close to my heart, so I'd likely partner with established educational charities or even fund scholarships for students who can't afford university. Finally, I'd allow myself some meaningful pleasures — perhaps traveling to places I've always wanted to visit, or pursuing my interest in photography seriously. Money doesn't change who you are; it amplifies it. My priorities would remain the same, just with more resources to act on them.",

function todayKey() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

let sessionStartTime = Date.now();
let sessionTickInterval = null;
function startSessionTimer() {
  sessionStartTime = Date.now();
  if (sessionTickInterval) clearInterval(sessionTickInterval);
  sessionTickInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - sessionStartTime) / 1000);
    if (elapsed < 5) return;
    if (!state.studyTime) state.studyTime = {};
    state.studyTime[todayKey()] = (state.studyTime[todayKey()] || 0) + 30;
    sessionStartTime = Date.now();
    try { storage.set('study_time', JSON.stringify(state.studyTime)); } catch {}
  }, 30000);
}

function getTodayMinutes() {
  if (!state.studyTime) return 0;
  return Math.round((state.studyTime[todayKey()] || 0) / 60);
}

function getStreak() {
  if (!state.studyTime) return 0;
  let streak = 0;
  const now = new Date();
  for (let i = 0; i < 365; i++) {
    const d = new Date(now);
    d.setDate(d.getDate() - i);
    const key = d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
    if ((state.studyTime[key] || 0) >= 60) streak++;
    else if (i > 0) break;
  }
  return streak;
}

function escapeHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#039;');
}

function shuffle(a) {
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random() * (i+1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pad2(n) { return String(n).padStart(2, '0'); }

function formatTime(seconds) {
  const m = Math.floor(seconds / 60);
  const s = Math.floor(seconds % 60);
  return pad2(m) + ':' + pad2(s);
}

function showToast(msg) {

  if (existing) existing.remove();
  const t = document.createElement('div');
  t.className = 'toast';

}

// SAME database name as main app - so cache is shared
const AUDIO_DB_NAME = 'det_audio_cache_v1';
const AUDIO_STORE = 'audio';
let audioDB = null;

function openAudioDB() {
  return new Promise((resolve, reject) => {
    if (audioDB) { resolve(audioDB); return; }
    if (!window.indexedDB) { reject(new Error('No IndexedDB')); return; }
    const req = indexedDB.open(AUDIO_DB_NAME, 1);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(AUDIO_STORE)) {
        db.createObjectStore(AUDIO_STORE);
      }
    };
    req.onsuccess = () => { audioDB = req.result; resolve(audioDB); };
    req.onerror = () => reject(req.error);
  });
}

async function audioCacheGet(key) {
  try {
    const db = await openAudioDB();
    return new Promise((resolve) => {
      const tx = db.transaction(AUDIO_STORE, 'readonly');
      const req = tx.objectStore(AUDIO_STORE).get(key);
      req.onsuccess = () => resolve(req.result || null);
      req.onerror = () => resolve(null);
    });
  } catch { return null; }
}

async function audioCacheSet(key, blob) {
  try {
    const db = await openAudioDB();
    return new Promise((resolve) => {
      const tx = db.transaction(AUDIO_STORE, 'readwrite');
      tx.objectStore(AUDIO_STORE).put(blob, key);
      tx.oncomplete = () => resolve(true);
      tx.onerror = () => resolve(false);
    });
  } catch { return false; }
}

async function audioCacheCount() {
  try {
    const db = await openAudioDB();
    return new Promise((resolve) => {
      const tx = db.transaction(AUDIO_STORE, 'readonly');
      const req = tx.objectStore(AUDIO_STORE).count();
      req.onsuccess = () => resolve(req.result || 0);
      req.onerror = () => resolve(0);
    });
  } catch { return 0; }
}

function makeAudioKey(text, voiceId) {
  return voiceId + '::' + text.trim().toLowerCase();
}

async function fetchElevenLabsAudio(text, voiceId) {
  if (!state.el.apiKey || !text || !text.trim()) return null;
  
  try {
    const url = 'https://api.elevenlabs.io/v1/text-to-speech/' + voiceId;
    const body = {
      text: text,
      model_id: 'eleven_flash_v2_5',
      voice_settings: {
        stability: 0.5,
        similarity_boost: 0.75,
        style: 0.0,
        use_speaker_boost: true
      }
    };
    
    const response = await fetch(url, {
      method: 'POST',
      headers: {
        'xi-api-key': state.el.apiKey,
        'Content-Type': 'application/json',
        'Accept': 'audio/mpeg'
      },
      body: JSON.stringify(body)
    });
    
    if (!response.ok) {
      console.error('ElevenLabs error:', response.status);
      if (response.status === 401) {
        showToast('⚠️ مفتاح API غير صحيح');
        state.el.enabled = false;
      } else if (response.status === 429) {
        showToast('⚠️ نفدت credits');
      }
      return null;
    }
    
    const blob = await response.blob();
    state.el.apiCalls++;
    return blob;
  } catch (e) {
    console.error('ElevenLabs fetch failed:', e);
    return null;
  }
}

let currentELAudio = null;

async function playElevenLabsAudio(text, isArabic) {
  if (!state.el.enabled || !state.el.apiKey) return false;
  
  const voiceId = isArabic ? state.el.voiceAr : state.el.voiceEn;
  const key = makeAudioKey(text, voiceId);
  
  let blob = await audioCacheGet(key);
  if (blob) {
    state.el.cacheHits++;
  } else {
    blob = await fetchElevenLabsAudio(text, voiceId);
    if (blob) await audioCacheSet(key, blob);
  }
  
  if (!blob) return false;
  
  return new Promise((resolve) => {
    if (currentELAudio) {
      try { currentELAudio.pause(); } catch {}
    }
    const url = URL.createObjectURL(blob);
    const audio = new Audio(url);
    currentELAudio = audio;
    audio.onended = () => {
      URL.revokeObjectURL(url);
      if (currentELAudio === audio) currentELAudio = null;
      resolve(true);
    };
    audio.onerror = () => {
      URL.revokeObjectURL(url);
      if (currentELAudio === audio) currentELAudio = null;
      resolve(false);
    };
    audio.play().catch(() => {
      URL.revokeObjectURL(url);
      resolve(false);
    });
  });
}

function stopElevenLabsAudio() {
  if (currentELAudio) {
    try { currentELAudio.pause(); } catch {}
    currentELAudio = null;
  }
}

let speechVoices = [];
let preferredVoice = null;
let preferredArVoice = null;

function scoreVoice(v, lang) {
  if (!v.lang.startsWith(lang)) return -1;
  let score = 0;
  if (/premium/i.test(v.name)) score += 100;
  if (/enhanced/i.test(v.name)) score += 60;
  if (/siri/i.test(v.name)) score += 90;
  if (/neural/i.test(v.name)) score += 80;
  if (lang === 'en') {
    if (/ava|evan|zoe|aaron/i.test(v.name)) score += 50;
    if (/samantha|alex/i.test(v.name)) score += 30;
    if (v.lang === 'en-US') score += 10;
  }
  if (v.localService) score += 5;
  return score;
}

function loadVoices() {
  if (!('speechSynthesis' in window)) return;
  speechVoices = window.speechSynthesis.getVoices();
  const enCand = speechVoices.map(v => ({v, s: scoreVoice(v, 'en')})).filter(x => x.s >= 0).sort((a,b) => b.s - a.s);
  const arCand = speechVoices.map(v => ({v, s: scoreVoice(v, 'ar')})).filter(x => x.s >= 0).sort((a,b) => b.s - a.s);
  preferredVoice = enCand[0]?.v || null;
  preferredArVoice = arCand[0]?.v || null;
}
if (typeof window !== 'undefined' && window.speechSynthesis) {
  loadVoices();
  window.speechSynthesis.onvoiceschanged = loadVoices;
}

async function speak(text, opts = {}) {
  const isArabic = opts.lang && opts.lang.startsWith('ar');
  
  // Try ElevenLabs first if enabled
  if (state.el.enabled && state.el.apiKey) {
    const success = await playElevenLabsAudio(text, isArabic);
    if (success) return;
  }
  
  // Fallback to native browser TTS
  if (!('speechSynthesis' in window)) return Promise.resolve();
  window.speechSynthesis.cancel();
  return new Promise((resolve) => {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = opts.lang || 'en-US';
    u.rate = opts.rate || 0.95;
    u.pitch = opts.pitch || 1;
    u.volume = 1;
    if (isArabic && preferredArVoice) u.voice = preferredArVoice;
    else if (preferredVoice) u.voice = preferredVoice;
    u.onend = () => resolve();
    u.onerror = () => resolve();
    window.speechSynthesis.speak(u);
  });
}

function stopSpeech() {
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  stopElevenLabsAudio();
}

/* ============================================================
   SPEECH EVALUATION — Audio Analysis (offline) + Speech-to-Text
   ============================================================ */

// Analyze audio blob: duration, silence ratio, speech rate estimate, volume
async function analyzeAudio(blob) {
  if (!blob) return null;
  try {
    const arrayBuffer = await blob.arrayBuffer();
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    if (!AudioContext) return null;
    const audioCtx = new AudioContext();
    const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
    
    const sampleRate = audioBuffer.sampleRate;
    const channelData = audioBuffer.getChannelData(0);
    const duration = audioBuffer.duration;
    
    // Analyze in 50ms windows
    const windowMs = 50;
    const windowSize = Math.floor(sampleRate * windowMs / 1000);
    const totalWindows = Math.floor(channelData.length / windowSize);
    
    // Calculate RMS (volume) for each window
    const rmsValues = [];
    let maxRMS = 0;
    for (let w = 0; w < totalWindows; w++) {
      let sum = 0;
      for (let i = 0; i < windowSize; i++) {
        const sample = channelData[w * windowSize + i];
        sum += sample * sample;
      }
      const rms = Math.sqrt(sum / windowSize);
      rmsValues.push(rms);
      if (rms > maxRMS) maxRMS = rms;
    }
    
    // Dynamic threshold: 12% of max volume = silence
    const silenceThreshold = maxRMS * 0.12;
    
    // Count silent vs speaking windows
    let silentWindows = 0;
    let speakingWindows = 0;
    // Track continuous silent runs (pauses)
    const pauseDurations = [];
    let currentSilenceRun = 0;
    let avgVolumeSum = 0;
    let avgVolumeCount = 0;
    
    rmsValues.forEach((rms) => {
      if (rms < silenceThreshold) {
        silentWindows++;
        currentSilenceRun++;
      } else {
        speakingWindows++;
        avgVolumeSum += rms;
        avgVolumeCount++;
        if (currentSilenceRun * windowMs >= 500) {
          // a real pause (>500ms)
          pauseDurations.push(currentSilenceRun * windowMs);
        }
        currentSilenceRun = 0;
      }
    });
    
    // Final silence at end
    if (currentSilenceRun * windowMs >= 500) {
      pauseDurations.push(currentSilenceRun * windowMs);
    }
    
    audioCtx.close();
    
    const speechRatio = speakingWindows / totalWindows;
    const avgVolume = avgVolumeCount > 0 ? avgVolumeSum / avgVolumeCount : 0;
    const longPauseCount = pauseDurations.filter(d => d >= 1500).length; // >1.5s pauses
    const totalPauseMs = pauseDurations.reduce((a, b) => a + b, 0);
    const speakingTimeSeconds = duration * speechRatio;
    
    return {
      duration: duration,
      speechRatio: speechRatio,
      speakingTime: speakingTimeSeconds,
      pauseCount: pauseDurations.length,
      longPauseCount: longPauseCount,
      totalPauseTime: totalPauseMs / 1000,
      avgVolumeNormalized: Math.min(1, avgVolume / 0.15), // normalize to 0-1
      // Heuristic word count estimate (avg 2.2 words/sec when speaking)
      estimatedWords: Math.round(speakingTimeSeconds * 2.2)
    };
  } catch (e) {
    console.error('Audio analysis failed:', e);
    return null;
  }
}

// Web Speech Recognition - transcribe the user's recording
function transcribeWithSpeechRecognition() {
  return new Promise((resolve) => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) {
      resolve({ error: 'المتصفح لا يدعم التعرف الصوتي. جرب Safari.' });
      return;
    }
    if (!state.audioBlob) {
      resolve({ error: 'لا يوجد تسجيل' });
      return;
    }
    // SpeechRecognition works on live mic, NOT on recorded blobs directly
    // The trick: replay the audio while listening
    // This is a known limitation - we have to ask user to re-speak OR
    // play the recording through speakers while recognition listens
    // Simpler approach: just listen to live mic for re-speaking
    resolve({ error: 'هذه الميزة تحتاج إعادة التسجيل مباشرة. اضغط زر "التحليل المباشر" بدلاً منها.' });
  });
}

// Live speech recognition - user speaks again and we analyze
let liveRecognition = null;
let liveTranscript = '';

// Detect browser for better error messages
function detectBrowser() {
  const ua = navigator.userAgent;
  const isIOS = /iPhone|iPad|iPod/.test(ua);
  const isEdge = /EdgiOS|EdgA|Edg\//.test(ua);
  const isChrome = /CriOS|Chrome/.test(ua) && !isEdge;
  const isFirefox = /FxiOS|Firefox/.test(ua);
  const isSafari = /Safari/.test(ua) && !isChrome && !isEdge && !isFirefox;
  return { isIOS, isEdge, isChrome, isFirefox, isSafari };
}

function checkSpeechRecognitionSupport() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return { supported: false, reason: 'no_api' };
  // On iOS Edge, the API exists but often doesn't work
  const b = detectBrowser();
  if (b.isIOS && b.isEdge) return { supported: 'maybe', reason: 'ios_edge' };
  return { supported: true };
}

function startLiveRecognition(callback) {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) {
    callback({ error: 'no_api' });
    return null;
  }
  
  try {
    liveRecognition = new SR();
    liveRecognition.lang = 'en-US';
    liveRecognition.continuous = true;
    liveRecognition.interimResults = true;
    liveTranscript = '';
    
    // Track if we ever got any result (to detect silent Edge failure)
    let gotAnyResult = false;
    
    liveRecognition.onresult = (event) => {
      gotAnyResult = true;
      let finalText = '';
      let interimText = '';
      for (let i = event.resultIndex; i < event.results.length; i++) {
        const transcript = event.results[i][0].transcript;
        if (event.results[i].isFinal) {
          finalText += transcript + ' ';
        } else {
          interimText += transcript;
        }
      }
      if (finalText) liveTranscript += finalText;
      const liveDisplay = document.getElementById('live-transcript');
      if (liveDisplay) {
        liveDisplay.innerHTML = '<span style="color:var(--text);">' + escapeHtml(liveTranscript) + '</span><span style="color:var(--text-muted);"> ' + escapeHtml(interimText) + '</span>';
      }
    };
    
    liveRecognition.onerror = (e) => {
      console.error('Recognition error:', e);
      if (e.error === 'not-allowed') {
        callback({ error: 'permission_denied' });
      } else if (e.error === 'no-speech') {
        // Don't fail
      } else if (e.error === 'service-not-allowed' || e.error === 'network') {
        callback({ error: 'browser_unsupported' });
      }
    };
    
    liveRecognition.onend = () => {
      if (state.liveRecognitionActive) {
        try { liveRecognition.start(); } catch(e) {}
      }
    };
    
    // Edge silent failure detection: if no results after 8 seconds, assume broken
    setTimeout(() => {
      if (state.liveRecognitionActive && !gotAnyResult) {
        const b = detectBrowser();
        if (b.isIOS && b.isEdge) {
          callback({ error: 'edge_silent_fail' });
        }
      }
    }, 8000);
    
    liveRecognition.start();
    state.liveRecognitionActive = true;
    return liveRecognition;
  } catch (e) {
    callback({ error: 'start_failed: ' + e.message });
    return null;
  }
}

function stopLiveRecognition() {
  state.liveRecognitionActive = false;
  if (liveRecognition) {
    try { liveRecognition.stop(); } catch(e) {}
    liveRecognition = null;
  }
}

// Comprehensive speech evaluation combining audio + transcript
function evaluateSpeech(audioAnalysis, transcript, prompt) {
  const result = {
    audio: audioAnalysis,
    transcript: transcript || '',
    metrics: {},
    score: 0,
    scoreBreakdown: {},
    feedback: [],
    strengths: [],
  };
  
  if (!audioAnalysis) {
    result.feedback.push('تعذّر تحليل التسجيل');
    return result;
  }
  
  let totalScore = 0;
  
  // 1. Duration utilization (15 pts) - used proper time?
  const targetTime = prompt.speak_time;
  const speakingTime = audioAnalysis.speakingTime;
  let timeScore = 0;
  if (speakingTime >= targetTime * 0.85) timeScore = 15;
  else if (speakingTime >= targetTime * 0.65) timeScore = 12;
  else if (speakingTime >= targetTime * 0.45) timeScore = 8;
  else if (speakingTime >= targetTime * 0.25) timeScore = 4;
  totalScore += timeScore;
  result.scoreBreakdown.time = timeScore;
  result.metrics.timeUsage = Math.round(speakingTime / targetTime * 100);
  
  // 2. Fluency (20 pts) - speech ratio (low pauses = fluent)
  let fluencyScore = 0;
  const sr = audioAnalysis.speechRatio;
  if (sr >= 0.80) fluencyScore = 20;
  else if (sr >= 0.70) fluencyScore = 17;
  else if (sr >= 0.60) fluencyScore = 13;
  else if (sr >= 0.50) fluencyScore = 9;
  else if (sr >= 0.40) fluencyScore = 5;
  totalScore += fluencyScore;
  result.scoreBreakdown.fluency = fluencyScore;
  result.metrics.fluencyPct = Math.round(sr * 100);
  
  // 3. Pauses penalty (15 pts max - fewer long pauses = better)
  let pauseScore = 15;
  const longPauses = audioAnalysis.longPauseCount;
  if (longPauses === 0) pauseScore = 15;
  else if (longPauses <= 2) pauseScore = 12;
  else if (longPauses <= 4) pauseScore = 8;
  else if (longPauses <= 6) pauseScore = 4;
  else pauseScore = 1;
  totalScore += pauseScore;
  result.scoreBreakdown.pauses = pauseScore;
  result.metrics.longPauses = longPauses;
  
  // 4. Volume/Confidence (10 pts) - clear audible voice
  let volumeScore = 0;
  const vol = audioAnalysis.avgVolumeNormalized;
  if (vol >= 0.5) volumeScore = 10;
  else if (vol >= 0.3) volumeScore = 7;
  else if (vol >= 0.15) volumeScore = 4;
  else volumeScore = 1;
  totalScore += volumeScore;
  result.scoreBreakdown.volume = volumeScore;
  result.metrics.confidence = Math.round(vol * 100);
  
  // 5. Speaking pace (10 pts) - estimated 2-3 words/sec is ideal
  let paceScore = 0;
  const wordsPerSec = audioAnalysis.estimatedWords / Math.max(1, audioAnalysis.speakingTime);
  if (wordsPerSec >= 1.8 && wordsPerSec <= 2.8) paceScore = 10;
  else if (wordsPerSec >= 1.4 && wordsPerSec <= 3.2) paceScore = 7;
  else if (wordsPerSec >= 1.0 && wordsPerSec <= 3.5) paceScore = 4;
  else paceScore = 2;
  totalScore += paceScore;
  result.scoreBreakdown.pace = paceScore;
  result.metrics.wordsPerMin = Math.round(wordsPerSec * 60);
  result.metrics.estimatedWords = audioAnalysis.estimatedWords;
  
  // 6. Transcript-based scoring (30 pts) - if we have transcript
  if (transcript && transcript.trim().length > 0) {
    const words = transcript.toLowerCase().match(/[a-z']+/g) || [];
    const uniqueWords = new Set(words);
    const ttr = words.length > 0 ? uniqueWords.size / words.length : 0;
    
    const advancedUsed = new Set();
    const transitionsUsed = new Set();
    words.forEach(w => {
      if (ADVANCED_VOCAB.has(w)) advancedUsed.add(w);
      if (TRANSITIONS.has(w)) transitionsUsed.add(w);
    });
    
    // Vocabulary diversity (10 pts)
    let vocabDivScore = 0;
    if (ttr >= 0.55) vocabDivScore = 10;
    else if (ttr >= 0.45) vocabDivScore = 7;
    else if (ttr >= 0.35) vocabDivScore = 5;
    else vocabDivScore = 2;
    totalScore += vocabDivScore;
    result.scoreBreakdown.vocabDiversity = vocabDivScore;
    
    // Advanced vocab (10 pts)
    let advScore = 0;
    if (advancedUsed.size >= 5) advScore = 10;
    else if (advancedUsed.size >= 3) advScore = 7;
    else if (advancedUsed.size >= 1) advScore = 4;
    totalScore += advScore;
    result.scoreBreakdown.advancedVocab = advScore;
    
    // Transitions (10 pts)
    let transScore = 0;
    if (transitionsUsed.size >= 3) transScore = 10;
    else if (transitionsUsed.size >= 2) transScore = 7;
    else if (transitionsUsed.size >= 1) transScore = 4;
    totalScore += transScore;
    result.scoreBreakdown.transitions = transScore;
    
    result.metrics.actualWords = words.length;
    result.metrics.uniqueWords = uniqueWords.size;
    result.metrics.advancedUsed = Array.from(advancedUsed);
    result.metrics.transitionsUsed = Array.from(transitionsUsed);
    result.hasTranscript = true;
  } else {
    // No transcript - cap score at 70% (out of 70 audio points)
    result.hasTranscript = false;
  }
  
  result.score = Math.round(totalScore);
  
  // DET equivalent estimate
  if (result.hasTranscript) {
    if (totalScore >= 85) { result.detLevel = 'C1-C2'; result.detRange = '120-160'; }
    else if (totalScore >= 70) { result.detLevel = 'B2-C1'; result.detRange = '100-120'; }
    else if (totalScore >= 55) { result.detLevel = 'B1-B2'; result.detRange = '80-100'; }
    else if (totalScore >= 40) { result.detLevel = 'A2-B1'; result.detRange = '60-80'; }
    else { result.detLevel = 'A1-A2'; result.detRange = '40-60'; }
  } else {
    // Audio-only - rougher estimate
    const audioPct = totalScore / 70;
    if (audioPct >= 0.85) { result.detLevel = 'B2+'; result.detRange = '100+'; }
    else if (audioPct >= 0.70) { result.detLevel = 'B1-B2'; result.detRange = '85-105'; }
    else if (audioPct >= 0.55) { result.detLevel = 'A2-B1'; result.detRange = '65-85'; }
    else { result.detLevel = 'A1-A2'; result.detRange = '45-65'; }
  }
  
  // Feedback
  if (timeScore < 12) {
    if (speakingTime < targetTime * 0.5) {
      result.feedback.push('استخدمت وقت قصير جداً (' + Math.round(speakingTime) + 'ث من ' + targetTime + 'ث). حاول الإطالة بتفاصيل وأمثلة');
    } else {
      result.feedback.push('استخدم وقت أكثر من الـ' + targetTime + 'ث المتاحة لتغطية فكرتك بعمق');
    }
  } else {
    result.strengths.push('استخدمت الوقت المتاح بشكل جيد');
  }
  
  if (fluencyScore < 13) {
    result.feedback.push('الطلاقة منخفضة (' + Math.round(sr * 100) + '% كلام، الباقي صمت). تدرّب على الكلام المتواصل');
  } else {
    result.strengths.push('طلاقة جيدة - تتكلم بإيقاع مستمر');
  }
  
  if (longPauses >= 4) {
    result.feedback.push('عندك ' + longPauses + ' توقفات طويلة (>1.5ث). جهّز أفكارك في الـ30ث التحضيرية');
  } else if (longPauses <= 2) {
    result.strengths.push('توقفات قليلة - ثقة عالية');
  }
  
  if (vol < 0.3) {
    result.feedback.push('صوتك منخفض - تكلم بثقة أعلى وبصوت أوضح');
  } else if (vol >= 0.5) {
    result.strengths.push('صوت واضح وواثق');
  }
  
  if (wordsPerSec < 1.4) {
    result.feedback.push('سرعة كلامك بطيئة (~' + Math.round(wordsPerSec * 60) + ' كلمة/دقيقة). الطبيعي 120-180 كلمة/دقيقة');
  } else if (wordsPerSec > 3.2) {
    result.feedback.push('سرعة كلامك عالية (~' + Math.round(wordsPerSec * 60) + ' كلمة/دقيقة) - بطّئ شوي للوضوح');
  } else if (wordsPerSec >= 1.8 && wordsPerSec <= 2.8) {
    result.strengths.push('سرعة كلام مثالية');
  }
  
  if (result.hasTranscript) {
    if (result.metrics.advancedUsed.length < 2) {
      result.feedback.push('استخدم مفردات أرقى (remarkable, significantly, demonstrate...)');
    } else if (result.metrics.advancedUsed.length >= 5) {
      result.strengths.push('استخدمت مفردات متقدمة بشكل ممتاز');
    }
    if (result.metrics.transitionsUsed.length < 2) {
      result.feedback.push('أضف روابط منطقية (however, therefore, moreover, finally)');
    } else if (result.metrics.transitionsUsed.length >= 3) {
      result.strengths.push('استخدام جيد للروابط');
    }
  }
  
  return result;
}

/* ============================================================
   AUDIO RECORDING (MediaRecorder API)
   ============================================================ */
let mediaRecorder = null;
let recordedChunks = [];

async function startRecording() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showToast('المتصفح لا يدعم التسجيل الصوتي');
    return false;
  }
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    recordedChunks = [];
    // Detect supported MIME type for iOS Safari compatibility
    let mimeType = '';
    const candidates = ['audio/webm', 'audio/mp4', 'audio/aac', 'audio/ogg'];
    for (const c of candidates) {
      if (MediaRecorder.isTypeSupported(c)) { mimeType = c; break; }
    }
    mediaRecorder = new MediaRecorder(stream, mimeType ? { mimeType } : undefined);
    mediaRecorder.ondataavailable = (e) => {
      if (e.data.size > 0) recordedChunks.push(e.data);
    };
    mediaRecorder.onstop = () => {
      const blob = new Blob(recordedChunks, { type: mimeType || 'audio/webm' });
      state.audioBlob = blob;
      if (state.recordingURL) URL.revokeObjectURL(state.recordingURL);
      state.recordingURL = URL.createObjectURL(blob);
      // Stop all tracks
      stream.getTracks().forEach(t => t.stop());
    };
    mediaRecorder.start();
    return true;
  } catch (e) {
    console.error('Recording failed:', e);
    showToast('فشل التسجيل - تأكد من السماح بالميكروفون');
    return false;
  }
}

function stopRecording() {
  if (mediaRecorder && mediaRecorder.state !== 'inactive') {
    mediaRecorder.stop();
  }
}

let playbackAudio = null;
function playRecording() {
  if (!state.recordingURL) return;
  if (playbackAudio) {
    playbackAudio.pause();
    playbackAudio = null;
  }
  playbackAudio = new Audio(state.recordingURL);
  playbackAudio.play().catch(e => console.error('Playback failed:', e));
}

/* ============================================================
   WRITING EVALUATION
   ============================================================ */
function evaluateWriting(text, prompt) {
  if (!text || !text.trim()) {
    return { score: 0, words: 0, error: 'لم تكتب أي شيء' };
  }
  // Tokenize
  const words = text.toLowerCase().match(/[a-z']+/g) || [];
  const totalWords = words.length;
  const uniqueWords = new Set(words);
  const typeTokenRatio = totalWords > 0 ? uniqueWords.size / totalWords : 0;
  
  // Sentence analysis
  const sentences = text.split(/[.!?]+/).filter(s => s.trim().length > 0);
  const sentenceCount = sentences.length;
  const avgSentenceLength = sentenceCount > 0 ? totalWords / sentenceCount : 0;
  
  // Advanced vocab usage
  const advancedUsed = new Set();
  const transitionsUsed = new Set();
  words.forEach(w => {
    if (ADVANCED_VOCAB.has(w)) advancedUsed.add(w);
    if (TRANSITIONS.has(w)) transitionsUsed.add(w);
  });
  
  // Score calculation (0-100)
  let score = 0;
  
  // Word count score (0-25 pts)
  const idealWords = prompt.ideal_words || 120;
  const minWords = prompt.min_words || 50;
  if (totalWords < minWords) {
    score += (totalWords / minWords) * 10;
  } else if (totalWords <= idealWords) {
    score += 15 + (totalWords - minWords) / (idealWords - minWords) * 10;
  } else if (totalWords <= idealWords * 1.5) {
    score += 25;
  } else {
    score += 22; // slight penalty for being too long
  }
  
  // Vocabulary diversity (0-20 pts)
  if (typeTokenRatio >= 0.65) score += 20;
  else if (typeTokenRatio >= 0.55) score += 16;
  else if (typeTokenRatio >= 0.45) score += 12;
  else if (typeTokenRatio >= 0.35) score += 8;
  else score += 4;
  
  // Sentence variety (0-15 pts)
  if (avgSentenceLength >= 12 && avgSentenceLength <= 22) score += 15;
  else if (avgSentenceLength >= 8 && avgSentenceLength <= 28) score += 10;
  else score += 5;
  
  // Advanced vocab (0-20 pts)
  if (advancedUsed.size >= 8) score += 20;
  else if (advancedUsed.size >= 5) score += 15;
  else if (advancedUsed.size >= 3) score += 10;
  else if (advancedUsed.size >= 1) score += 5;
  
  // Transitions (0-15 pts)
  if (transitionsUsed.size >= 5) score += 15;
  else if (transitionsUsed.size >= 3) score += 11;
  else if (transitionsUsed.size >= 2) score += 7;
  else if (transitionsUsed.size >= 1) score += 4;
  
  // Sentence count bonus (0-5 pts)
  if (sentenceCount >= 5) score += 5;
  else if (sentenceCount >= 3) score += 3;
  else score += 1;
  
  // DET equivalent
  let detLevel = '';
  let detRange = '';
  if (score >= 85) { detLevel = 'C1-C2'; detRange = '120-160'; }
  else if (score >= 70) { detLevel = 'B2-C1'; detRange = '100-120'; }
  else if (score >= 55) { detLevel = 'B1-B2'; detRange = '80-100'; }
  else if (score >= 40) { detLevel = 'A2-B1'; detRange = '60-80'; }
  else { detLevel = 'A1-A2'; detRange = '40-60'; }
  
  // Feedback messages
  const feedback = [];
  if (totalWords < minWords) feedback.push('عدد الكلمات قليل - اكتب على الأقل ' + minWords + ' كلمة');
  if (totalWords > idealWords * 1.4) feedback.push('الإجابة طويلة - حاول الاختصار للوضوح');
  if (typeTokenRatio < 0.45) feedback.push('تكرّر كلمات كثيرة - استخدم مرادفات أكثر');
  if (avgSentenceLength < 8) feedback.push('جملك قصيرة جداً - حاول دمج الأفكار');
  if (avgSentenceLength > 28) feedback.push('جملك طويلة جداً - قسّمها لجمل أوضح');
  if (advancedUsed.size < 3) feedback.push('قلة المفردات المتقدمة - استخدم كلمات أرقى');
  if (transitionsUsed.size < 2) feedback.push('قلة الروابط - أضف however/therefore/moreover');
  
  const strengths = [];
  if (totalWords >= minWords && totalWords <= idealWords * 1.3) strengths.push('عدد الكلمات مناسب');
  if (typeTokenRatio >= 0.55) strengths.push('تنوع جيد في المفردات');
  if (advancedUsed.size >= 5) strengths.push('استخدام جيد للمفردات المتقدمة');
  if (transitionsUsed.size >= 3) strengths.push('روابط منطقية ممتازة');
  if (avgSentenceLength >= 12 && avgSentenceLength <= 22) strengths.push('طول جمل متوازن');
  
  return {
    score: Math.round(score),
    words: totalWords,
    uniqueWords: uniqueWords.size,
    typeTokenRatio: Math.round(typeTokenRatio * 100),
    sentenceCount,
    avgSentenceLength: Math.round(avgSentenceLength),
    advancedUsed: Array.from(advancedUsed),
    transitionsUsed: Array.from(transitionsUsed),
    detLevel, detRange,
    feedback, strengths
  };
}

function ratingFor(value, thresholds) {
  if (value >= thresholds[0]) return 'excellent';
  if (value >= thresholds[1]) return 'good';
  if (value >= thresholds[2]) return 'fair';
  return 'weak';
}

function ratingLabel(rating) {
  return { excellent: 'ممتاز', good: 'جيد', fair: 'مقبول', weak: 'يحتاج عمل' }[rating] || '';
}

function startListenMode() {
  // Pick sentences from speaking model answers - they're well-formed
  const sentences = [];
  SPEAKING_PROMPTS.filter(p => p.model).forEach(p => {
    const splits = p.model.split(/(?<=[.!?])\s+/);
    splits.forEach(s => {
      const trim = s.trim();
      const wordCount = trim.split(/\s+/).length;
      if (wordCount >= 6 && wordCount <= 18 && /^[A-Z]/.test(trim)) {
        sentences.push(trim);
      }
    });
  });
  shuffle(sentences);
  state.listenSentences = sentences.slice(0, 20);
  state.listenIdx = 0;
  state.listenInput = '';
  state.listenChecked = false;
  state.mode = 'listen';
  state.screen = 'listen';
  render();
  // Auto-speak first sentence
  setTimeout(() => {
    if (state.listenSentences[0]) speak(state.listenSentences[0], { rate: 0.9 });
  }, 500);
}

/* ============================================================
   SPEAKING FLOW
   ============================================================ */
function tickPrepTimer() {
  state.prepTimeLeft--;
  if (state.prepTimeLeft <= 0) {
    clearInterval(state.timer);
    state.timer = null;
    beginRecording();
  } else {
    updateTimerDisplay();
  }
}

function tickSpeakTimer() {
  state.speakTimeLeft--;
  if (state.speakTimeLeft <= 0) {
    clearInterval(state.timer);
    state.timer = null;
    finishSpeaking();
  } else {
    updateTimerDisplay();
  }
}

function updateTimerDisplay() {
  const t = document.getElementById('timer-display');
  if (!t) return;
  const phase = state.speakingPhase;
  const left = phase === 'prep' ? state.prepTimeLeft : state.speakTimeLeft;
  const total = phase === 'prep' ? state.prompt.prep_time : state.prompt.speak_time;
  t.textContent = formatTime(left);
  const bar = document.getElementById('timer-bar');
  if (bar) bar.style.width = ((total - left) / total * 100) + '%';
}

function beginPrepPhase() {
  state.speakingPhase = 'prep';
  state.prepTimeLeft = state.prompt.prep_time;
  state.screen = 'speaking_prep';
  render();
  state.timer = setInterval(tickPrepTimer, 1000);
}

function skipPrep() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  beginRecording();
}

async function beginRecording() {
  state.speakingPhase = 'recording';
  state.speakTimeLeft = state.prompt.speak_time;
  state.screen = 'speaking_record';
  render();
  const ok = await startRecording();
  if (!ok) {
    state.speakingPhase = 'done';
    render();
    return;
  }
  state.timer = setInterval(tickSpeakTimer, 1000);
}

function stopSpeakingEarly() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  finishSpeaking();
}

function finishSpeaking() {
  stopRecording();
  state.speakingPhase = 'done';
  state.screen = 'speaking_review';
  state.speechAnalysis = null;
  state.speechAnalyzing = true;
  // Wait a beat for blob to be ready, then analyze
  setTimeout(async () => {
    render();
    // Auto-analyze audio (offline, always works)
    if (state.audioBlob) {
      try {
        const audioData = await analyzeAudio(state.audioBlob);
        if (audioData) {
          state.speechAnalysis = evaluateSpeech(audioData, '', state.prompt);
        }
      } catch (e) { console.error('Auto-analysis failed:', e); }
    }
    state.speechAnalyzing = false;
    render();
  }, 300);
  // Save attempt
  state.history.push({
    type: 'speaking',
    promptId: state.prompt.id,
    topic: state.prompt.topic,
    date: Date.now()
  });
  saveHistory();
}

// User-initiated: live transcript analysis (re-speak with mic)
async function startLiveAnalysis() {
  // Check support first
  const support = checkSpeechRecognitionSupport();
  if (!support.supported) {
    state.screen = 'browser_help';
    render();
    return;
  }
  
  state.liveTranscriptText = '';
  liveTranscript = '';
  state.liveRecognitionError = null;
  
  // Show live recording UI first
  state.screen = 'live_analysis';
  render();
  
  // Start recognition - errors will trigger browser_help screen
  setTimeout(() => {
    startLiveRecognition((err) => {
      if (err && err.error) {
        // Handle specific errors
        if (err.error === 'no_api' || err.error === 'browser_unsupported' || err.error === 'edge_silent_fail') {
          stopLiveRecognition();
          state.liveRecognitionError = err.error;
          state.screen = 'browser_help';
          render();
        } else if (err.error === 'permission_denied') {
          stopLiveRecognition();
          showToast('تم رفض إذن الميكروفون - فعّله من إعدادات المتصفح');
          state.screen = 'speaking_review';
          render();
        }
      }
    });
  }, 100);
}

function stopLiveAnalysis() {
  stopLiveRecognition();
  state.liveTranscriptText = liveTranscript;
  
  // Re-evaluate with transcript
  if (state.audioBlob && state.speechAnalysis && state.speechAnalysis.audio) {
    state.speechAnalysis = evaluateSpeech(
      state.speechAnalysis.audio,
      state.liveTranscriptText,
      state.prompt
    );
  } else {
    // Just transcript evaluation - approximate
    const fakeAudio = {
      duration: 60, speechRatio: 0.7, speakingTime: 42,
      pauseCount: 2, longPauseCount: 1, totalPauseTime: 3,
      avgVolumeNormalized: 0.5, estimatedWords: (state.liveTranscriptText.match(/[a-z']+/gi) || []).length
    };
    state.speechAnalysis = evaluateSpeech(fakeAudio, state.liveTranscriptText, state.prompt);
  }
  
  state.screen = 'speaking_review';
  render();
}

function tickWritingTimer() {
  if (!writingTimerActive) return;

  if (state.writingTimeLeft <= 0) {
    clearInterval(state.timer);
    state.timer = null;
    writingTimerActive = false;
    showToast('انتهى الوقت!');
    // Don't auto-submit, just stop timer
  }
}

function startWritingTimer() {
  if (writingTimerActive) return;
  writingTimerActive = true;
  state.timer = setInterval(tickWritingTimer, 1000);
}

function updateWritingStats() {
  const ta = document.getElementById('write-area');
  if (!ta) return;
  state.writingText = ta.value;
  const words = (ta.value.toLowerCase().match(/[a-z']+/g) || []).length;
  const wn = document.getElementById('w-words');
  if (wn) {
    wn.textContent = words;
    const ideal = state.prompt.ideal_words;
    const min = state.prompt.min_words;
    wn.className = 'writing-stat-num';
    if (words < min) wn.classList.add('low');
    else if (words <= ideal * 1.3) wn.classList.add('good');
    else wn.classList.add('over');
  }
}

function submitWriting() {
  if (state.timer) { clearInterval(state.timer); state.timer = null; }
  writingTimerActive = false;
  const ta = document.getElementById('write-area');
  if (ta) state.writingText = ta.value;
  if (!state.writingText.trim()) {
    showToast('اكتب شيئاً أولاً');
    return;
  }
  state.writingResult = evaluateWriting(state.writingText, state.prompt);
  state.writingEvaluated = true;
  state.history.push({
    type: 'writing',
    promptId: state.prompt.id,
    topic: state.prompt.topic,
    score: state.writingResult.score,
    words: state.writingResult.words,
    date: Date.now()
  });
  saveHistory();
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ============================================================
   LISTEN & TYPE FLOW
   ============================================================ */
function replayListen() {
  const s = state.listenSentences[state.listenIdx];
  if (!s) return;
  // Cancel any word-by-word playback
  wordByWordCancelled = true;
  speak(s, { rate: 1.0 });
}

function replayListenSlow() {
  const s = state.listenSentences[state.listenIdx];
  if (!s) return;
  // Strategy 1: Try very slow rate first (some voices ignore extremes)
  // Strategy 2: Add commas between words to force pauses (more reliable on iOS)
  const slowText = s.split(/\s+/).join(', ');
  speak(slowText, { rate: 0.5 });
}

function replayListenVerySlow() {
  const s = state.listenSentences[state.listenIdx];
  if (!s) return;
  // Add periods between EACH word - forces clear pauses on every voice
  const words = s.replace(/[.!?,]/g, '').split(/\s+/);
  // Speak each word separately with a delay
  speakWordByWord(words, 0);
}

let wordByWordCancelled = false;
function speakWordByWord(words, idx) {
  if (idx >= words.length || wordByWordCancelled) {
    wordByWordCancelled = false;
    return;
  }
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(words[idx]);
  u.lang = 'en-US';
  u.rate = 0.8;
  if (preferredVoice) u.voice = preferredVoice;
  u.onend = () => {
    setTimeout(() => speakWordByWord(words, idx + 1), 400);
  };
  u.onerror = () => {
    setTimeout(() => speakWordByWord(words, idx + 1), 400);
  };
  window.speechSynthesis.speak(u);
}

function checkListen() {
  wordByWordCancelled = true;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  const inp = document.getElementById('listen-inp');
  if (!inp) return;
  state.listenInput = inp.value;
  state.listenChecked = true;
  render();
}

function nextListen() {
  wordByWordCancelled = true;
  if (window.speechSynthesis) window.speechSynthesis.cancel();
  state.listenIdx++;
  state.listenInput = '';
  state.listenChecked = false;
  if (state.listenIdx >= state.listenSentences.length) {
    showToast('انتهت الجلسة! أحسنت');
    setTimeout(goHome, 1200);
    return;
  }
  render();
  setTimeout(() => {
    if (state.listenSentences[state.listenIdx]) {
      speak(state.listenSentences[state.listenIdx], { rate: 0.9 });
    }
    const inp = document.getElementById('listen-inp');
    if (inp) inp.focus();
  }, 400);
}

function compareWords(target, user) {
  // Tokenize both
  const targetWords = target.toLowerCase().match(/[a-z']+/g) || [];
  const userWords = user.toLowerCase().match(/[a-z']+/g) || [];
  // Simple sequential comparison
  const result = [];
  let userIdx = 0;
  const userUsed = new Set();
  
  targetWords.forEach((tw, idx) => {
    // Look for tw in user words starting from userIdx
    let found = false;
    for (let i = userIdx; i < userWords.length; i++) {
      if (!userUsed.has(i) && userWords[i] === tw) {
        result.push({ word: tw, status: 'correct' });
        userUsed.add(i);
        userIdx = i + 1;
        found = true;
        break;
      }
    }
    if (!found) {
      result.push({ word: tw, status: 'missing' });
    }
  });
  
  // Now add extra user words as wrong
  userWords.forEach((uw, idx) => {
    if (!userUsed.has(idx)) {
      result.push({ word: uw, status: 'extra' });
    }
  });
  
  const correctCount = result.filter(r => r.status === 'correct').length;
  return { result, correctCount, total: targetWords.length };
}

        <div class="timer-display" id="w-timer">${formatTime(state.writingTimeLeft)}</div>
        <div class="timer-progress"><div class="timer-bar" id="w-timer-bar" style="width: 0%;"></div></div>
      </div>
      
      <div class="writing-stats-bar">
        <div class="writing-stat">
          <div class="writing-stat-num" id="w-words">0</div>
          <div class="writing-stat-label">كلمة</div>
        </div>
        <div class="writing-stat">
          <div class="writing-stat-num">${p.min_words || 50}</div>
          <div class="writing-stat-label">حد أدنى</div>
        </div>
        <div class="writing-stat">
          <div class="writing-stat-num">${p.ideal_words || 120}</div>
          <div class="writing-stat-label">مثالي</div>
        </div>
      </div>
      
      <textarea 
        id="write-area" 
        class="write-area"
        placeholder="Start writing your answer here..."
        oninput="updateWritingStats(); if(!writingTimerActive) startWritingTimer();"
      >${escapeHtml(state.writingText)}</textarea>
      
      <div style="height: 12px;"></div>
      <button class="btn btn-success" onclick="submitWriting()">✓ سلّم وقيّم إجابتي</button>
    </div>
  `;
}

function renderWritingResult() {
  const p = state.prompt;
  const r = state.writingResult;
  
  const scoreClass = r.score >= 75 ? 'good' : r.score >= 55 ? 'average' : 'needs-work';
  const wordsRating = r.words >= p.min_words ? (r.words <= p.ideal_words * 1.3 ? 'good' : 'fair') : 'weak';
  const ttrRating = ratingFor(r.typeTokenRatio, [60, 50, 40]);
  const sentRating = (r.avgSentenceLength >= 12 && r.avgSentenceLength <= 22) ? 'excellent' : 
                     (r.avgSentenceLength >= 8 && r.avgSentenceLength <= 28) ? 'good' : 'fair';
  const vocabRating = ratingFor(r.advancedUsed.length, [8, 5, 3]);
  const transRating = ratingFor(r.transitionsUsed.length, [5, 3, 2]);
  
  return `
    <div class="fade-in">
      <div class="screen-header">
        <button class="header-back" onclick="goHome()">→</button>
        <div class="header-title">📊 نتيجة التقييم</div>
      </div>
      
      <div class="score-card">
        <div class="score-label">درجتك</div>
        <div class="score-display ${scoreClass}">${r.score}</div>
        <div class="score-label">من 100</div>
        <div class="score-equivalent">≈ DET ${r.detRange} (${r.detLevel})</div>
      </div>
      
      <div class="metrics-grid">
        <div class="metric-card">
          <div class="metric-label">عدد الكلمات</div>
          <div class="metric-value">${r.words}</div>
          <span class="metric-rating ${wordsRating}">${ratingLabel(wordsRating)}</span>
        </div>
        <div class="metric-card">
          <div class="metric-label">تنوع المفردات</div>
          <div class="metric-value">${r.typeTokenRatio}%</div>
          <span class="metric-rating ${ttrRating}">${ratingLabel(ttrRating)}</span>
        </div>
        <div class="metric-card">
          <div class="metric-label">معدل الجملة</div>
          <div class="metric-value">${r.avgSentenceLength}</div>
          <span class="metric-rating ${sentRating}">${ratingLabel(sentRating)}</span>
        </div>
        <div class="metric-card">
          <div class="metric-label">مفردات متقدمة</div>
          <div class="metric-value">${r.advancedUsed.length}</div>
          <span class="metric-rating ${vocabRating}">${ratingLabel(vocabRating)}</span>
        </div>
        <div class="metric-card">
          <div class="metric-label">الروابط</div>
          <div class="metric-value">${r.transitionsUsed.length}</div>
          <span class="metric-rating ${transRating}">${ratingLabel(transRating)}</span>
        </div>
        <div class="metric-card">
          <div class="metric-label">عدد الجمل</div>
          <div class="metric-value">${r.sentenceCount}</div>
          <span class="metric-rating ${r.sentenceCount >= 5 ? 'good' : 'fair'}">${r.sentenceCount >= 5 ? 'جيد' : 'مقبول'}</span>
        </div>
      </div>
      
      ${r.strengths.length > 0 ? `
        <div class="feedback-card" style="border-color: var(--success); border-right-color: var(--success); background: var(--success-bg);">
          <h4 style="color: var(--success);">✓ نقاط القوة</h4>
          <ul>${r.strengths.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>
        </div>
      ` : ''}
      
      ${r.feedback.length > 0 ? `
        <div class="feedback-card">
          <h4>💡 للتحسين</h4>
          <ul>${r.feedback.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>
        </div>
      ` : ''}
      
      ${r.advancedUsed.length > 0 ? `
        <div class="feedback-card" style="background: #FBF6E9; border-right-color: var(--accent);">
          <h4>🌟 مفردات متقدمة استخدمتها</h4>
          <div class="vocab-pills" style="margin-top: 4px;">
            ${r.advancedUsed.slice(0, 12).map(v => `<span class="vocab-pill">${escapeHtml(v)}</span>`).join('')}
          </div>
        </div>
      ` : ''}
      
      <div class="prompt-card">
        <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 8px;">إجابتك:</div>
        <div style="direction: ltr; text-align: left; font-family: 'Outfit', sans-serif; font-size: 14px; line-height: 1.7; max-height: 200px; overflow-y: auto;">
          ${escapeHtml(state.writingText)}
        </div>
      </div>
      
      ${p.model ? `
        <div class="model-card">
          <h4>📝 إجابة نموذجية للمقارنة</h4>
          <div class="model-text">${escapeHtml(p.model)}</div>
          <div class="model-listen">
            <button onclick="speak(state.prompt.model, {rate: 0.9})">▶ استمع للنموذج</button>
          </div>
        </div>
      ` : ''}
      
      <button class="btn" onclick="startWriting()">✍️ موضوع جديد</button>
      <div style="height: 8px;"></div>
      <button class="btn btn-secondary" onclick="goHome()">🏠 الرئيسية</button>
    </div>
  `;
}

function renderListen() {
  const s = state.listenSentences[state.listenIdx];
  if (!s) {
    return `<div class="fade-in" style="text-align: center; padding: 60px 20px;">
      <div style="font-size: 56px; margin-bottom: 16px;">🎉</div>
      <div>انتهت الجلسة!</div>
      <div style="height: 16px;"></div>
      <button class="btn" onclick="goHome()">العودة للرئيسية</button>
    </div>`;
  }
  
  const cur = state.listenIdx + 1;
  const total = state.listenSentences.length;
  
  let resultHTML = '';
  if (state.listenChecked) {
    const comp = compareWords(s, state.listenInput);
    const wordsHTML = comp.result.map(r => {
      if (r.status === 'correct') return `<span class="word-correct">${escapeHtml(r.word)}</span>`;
      if (r.status === 'missing') return `<span class="word-missing">[${escapeHtml(r.word)}]</span>`;
      return `<span class="word-wrong">${escapeHtml(r.word)}</span>`;
    }).join(' ');
    const pct = Math.round((comp.correctCount / comp.total) * 100);
    resultHTML = `
      <div class="listen-result" style="background: var(--surface-2);">
        <div style="margin-bottom: 8px; font-weight: 700; color: ${pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--error)'};">
          ${comp.correctCount} / ${comp.total} كلمة صحيحة (${pct}%)
        </div>
        <div style="font-size: 13px; color: var(--text-muted); margin-bottom: 8px;">الإجابة الصحيحة:</div>
        <div style="font-size: 14px; line-height: 1.8;">${wordsHTML}</div>
        <div style="font-size: 11px; color: var(--text-muted); margin-top: 10px; line-height: 1.6;">
          <span style="color: var(--success);">■ صحيح</span> &nbsp; 
          <span style="color: var(--warning);">■ ناقص</span> &nbsp; 
          <span style="color: var(--error);">■ خطأ</span>
        </div>
      </div>
    `;
  }
  
  return `
    <div class="fade-in">
      <div class="screen-header">
        <button class="header-back" onclick="goHome()">→</button>
        <div class="header-title">🎧 استمع واكتب</div>
        <div style="margin-right: auto; font-size: 13px; font-weight: 700; color: var(--primary); background: var(--surface); padding: 6px 12px; border-radius: 100px;">
          ${cur} / ${total}
        </div>
      </div>
      
      <div class="listen-card">
        <div class="listen-icon-big" onclick="replayListen()">🔊</div>
        <div class="listen-instr">اضغط للاستماع</div>
        <div style="font-size: 12px; opacity: 0.8; margin-top: 4px;">اكتب الجملة التي تسمعها</div>
      </div>
      
      <div style="display: flex; gap: 6px; margin-bottom: 12px;">
        <button class="btn btn-secondary" onclick="replayListen()" style="flex: 1; padding: 12px 8px; font-size: 13px;">▶ عادية</button>
        <button class="btn btn-secondary" onclick="replayListenSlow()" style="flex: 1; padding: 12px 8px; font-size: 13px;">🐢 بطيء</button>
        <button class="btn btn-secondary" onclick="replayListenVerySlow()" style="flex: 1; padding: 12px 8px; font-size: 13px;">🔍 كلمة كلمة</button>
      </div>
      
      <input 
        type="text" 
        id="listen-inp" 
        class="listen-input"
        placeholder="Type what you hear..."
        autocomplete="off"
        autocapitalize="off"
        autocorrect="off"
        spellcheck="false"
        value="${escapeHtml(state.listenInput)}"
        ${state.listenChecked ? 'disabled' : ''}
        onkeydown="if(event.key === 'Enter' && !${state.listenChecked}) checkListen();"
      />
      
      <div style="height: 12px;"></div>
      
      ${state.listenChecked ? `
        ${resultHTML}
        <div style="height: 12px;"></div>
        <button class="btn" onclick="nextListen()">التالي ←</button>
      ` : `
        <button class="btn" onclick="checkListen()">تحقق</button>
      `}
    </div>
  `;
}

function render() {
  const app = document.getElementById('app');
  let html = '';
  if (state.screen === 'home') html = renderHome();
  else if (state.screen === 'speaking_prep') html = renderSpeakingPrep();
  else if (state.screen === 'speaking_record') html = renderSpeakingRecord();
  else if (state.screen === 'speaking_review') html = renderSpeakingReview();
  else if (state.screen === 'writing') html = renderWriting();
  else if (state.screen === 'listen') html = renderListen();
  else if (state.screen === 'live_analysis') html = renderLiveAnalysis();
  else if (state.screen === 'browser_help') html = renderBrowserHelp();
  else if (state.screen === 'el_settings') html = renderElSettings();
  
  app.innerHTML = html;
  
  // Start timer for speaking prep
  if (state.screen === 'speaking_prep' && state.speakingPhase === 'prep' && !state.timer) {
    state.timer = setInterval(tickPrepTimer, 1000);
  }
}

function renderSpeechAnalysis(a) {
  if (!a || !a.audio) return '';
  
  const scoreClass = a.score >= 75 ? 'good' : a.score >= 55 ? 'average' : 'needs-work';
  
  const fluencyRating = a.metrics.fluencyPct >= 75 ? 'excellent' : a.metrics.fluencyPct >= 60 ? 'good' : a.metrics.fluencyPct >= 45 ? 'fair' : 'weak';
  const timeRating = a.metrics.timeUsage >= 80 ? 'excellent' : a.metrics.timeUsage >= 60 ? 'good' : a.metrics.timeUsage >= 40 ? 'fair' : 'weak';
  const paceRating = (a.metrics.wordsPerMin >= 110 && a.metrics.wordsPerMin <= 170) ? 'excellent' : 
                      (a.metrics.wordsPerMin >= 85 && a.metrics.wordsPerMin <= 200) ? 'good' : 'fair';
  const pauseRating = a.metrics.longPauses === 0 ? 'excellent' : a.metrics.longPauses <= 2 ? 'good' : a.metrics.longPauses <= 4 ? 'fair' : 'weak';
  const volumeRating = a.metrics.confidence >= 50 ? 'excellent' : a.metrics.confidence >= 30 ? 'good' : 'fair';
  
  return `
    <div class="score-card">
      <div class="score-label">تقييم نطقك</div>
      <div class="score-display ${scoreClass}">${a.score}</div>
      <div class="score-label">من ${a.hasTranscript ? '100' : '70 (صوتي فقط)'}</div>
      <div class="score-equivalent">≈ DET ${a.detRange} (${a.detLevel})</div>
    </div>
    
    <div class="metrics-grid">
      <div class="metric-card">
        <div class="metric-label">⏱️ الوقت المستخدم</div>
        <div class="metric-value">${a.metrics.timeUsage}%</div>
        <span class="metric-rating ${timeRating}">${ratingLabel(timeRating)}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">🗣️ الطلاقة</div>
        <div class="metric-value">${a.metrics.fluencyPct}%</div>
        <span class="metric-rating ${fluencyRating}">${ratingLabel(fluencyRating)}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">⏸️ توقفات طويلة</div>
        <div class="metric-value">${a.metrics.longPauses}</div>
        <span class="metric-rating ${pauseRating}">${ratingLabel(pauseRating)}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">⚡ السرعة (ك/د)</div>
        <div class="metric-value">${a.metrics.wordsPerMin}</div>
        <span class="metric-rating ${paceRating}">${ratingLabel(paceRating)}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">🔊 الثقة (الصوت)</div>
        <div class="metric-value">${a.metrics.confidence}%</div>
        <span class="metric-rating ${volumeRating}">${ratingLabel(volumeRating)}</span>
      </div>
      <div class="metric-card">
        <div class="metric-label">📝 كلمات تقديرية</div>
        <div class="metric-value">${a.hasTranscript ? a.metrics.actualWords : '~' + a.metrics.estimatedWords}</div>
        <span class="metric-rating ${a.hasTranscript ? 'excellent' : 'fair'}">${a.hasTranscript ? 'دقيق' : 'تقديري'}</span>
      </div>
    </div>
    
    ${a.hasTranscript && a.transcript ? `
      <div class="model-card" style="border-color: var(--primary);">
        <h4 style="color: var(--primary);">📄 نص كلامك</h4>
        <div class="model-text" style="font-size: 13.5px;">${escapeHtml(a.transcript)}</div>
        ${a.metrics.advancedUsed && a.metrics.advancedUsed.length > 0 ? `
          <div style="margin-top: 10px; font-size: 12px; color: var(--text-muted); margin-bottom: 4px;">مفردات متقدمة استخدمتها:</div>
          <div class="vocab-pills">
            ${a.metrics.advancedUsed.slice(0, 10).map(v => `<span class="vocab-pill">${escapeHtml(v)}</span>`).join('')}
          </div>
        ` : ''}
      </div>
    ` : ''}
    
    ${a.strengths.length > 0 ? `
      <div class="feedback-card" style="border-color: var(--success); border-right-color: var(--success); background: var(--success-bg);">
        <h4 style="color: var(--success);">✓ نقاط القوة</h4>
        <ul>${a.strengths.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>
      </div>
    ` : ''}
    
    ${a.feedback.length > 0 ? `
      <div class="feedback-card">
        <h4>💡 للتحسين</h4>
        <ul>${a.feedback.map(s => `<li>${escapeHtml(s)}</li>`).join('')}</ul>
      </div>
    ` : ''}
  `;
}

function openInSafari() {
  // iOS Safari URL scheme to force open in Safari
  const url = window.location.href;
  // Try x-web-search first (iOS specific)
  const safariURL = url.replace(/^https?:/, 'x-safari-https:');
  window.location.href = safariURL;
  // If that fails, after a delay, try alternative method
  setTimeout(() => {
    // Show instructions instead
    showToast('انسخ الرابط وافتحه في Safari');
  }, 1500);
}

function copyURLToClipboard() {
  const url = window.location.href;
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(url).then(() => {
      showToast('✓ تم نسخ الرابط - افتحه في Safari');
    }).catch(() => {
      // Fallback for older browsers
      const ta = document.createElement('textarea');
      ta.value = url;
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); showToast('✓ تم نسخ الرابط'); } catch(e) {}
      document.body.removeChild(ta);
    });
  }
}
